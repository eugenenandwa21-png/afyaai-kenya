async function loadPatients(){
  try{
    const snap = await db.collection("patients").orderBy("createdAt","desc").limit(200).get();
    patientsCache = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  }catch(e){
    patientsCache = [];
    toast("Couldn't load patients: "+e.message, true);
  }
  renderPatientList(el("patientSearch") ? el("patientSearch").value : "");
}
function renderPatientList(filter){
  const box = el("patientList"); if(!box) return;
  const q = (filter||"").trim().toLowerCase();
  const rows = patientsCache.filter(p=>!q || [p.code,p.sha,p.residence,p.allergies,p.phone].some(v=>String(v||"").toLowerCase().includes(q)));
  if(!rows.length){ box.innerHTML = `<div class="plist__empty">${patientsCache.length? "No matches." : "No patients yet. Add the first one."}</div>`; return; }
  box.innerHTML = rows.map(p=>`
    <button class="pitem${activePatient&&activePatient.id===p.id?' is-active':''}" data-id="${esc(p.id)}">
      ${AVATAR}
      <span><span class="nm" style="font-family:var(--data);letter-spacing:.02em;font-size:13.5px">${esc(p.code)}</span><span class="mt">${esc(String(p.age))}${esc(p.sex||"")}${p.residence?" · "+esc(p.residence):""}</span></span>
      <span class="sha">${esc(p.sha||"")}</span>
    </button>`).join("");
}
async function selectPatient(id){
  const p = patientsCache.find(x=>x.id===id); if(!p) return;
  activePatient = p;
  historyMode = (num(p.age)!=null && num(p.age)<12) ? "paeds" : "adult";
  $$(".pitem").forEach(i=>i.classList.toggle("is-active", i.dataset.id===id));
  renderCtx(); refreshGates(); buildHistory(); buildLabs(); refreshDosing();
  /* show pip on encounter nav button when patient selected */
  const encounterPip = el("bnav_encounter");
  if(encounterPip){ let pip=encounterPip.querySelector(".bnav-pip"); if(!pip){ pip=document.createElement("span"); pip.className="bnav-pip"; encounterPip.appendChild(pip); } }
  // reset treatment sheet and encounter save buttons
  txSheet=[]; if(el("tx_sheetWrap")) renderTxSheet(); clearTxForm(); labOrders=[]; clearDiagnosisForm(); clearWorkingDx();
  ["triageSaveBtn","ancSaveBtn","billFileBtn"].forEach(b=> el(b) && (el(b).disabled = true));
  renderPatientDetail(true);
}

async function saveNewPatient(){
  const age = el("np_age").value.trim();
  if(!age){ toast("Enter the patient's age", true); return; }
  const rec = { code: makeCode(), age, sex: el("np_sex").value,
    weight: el("np_weight").value.trim(),
    prevAdmissions: el("np_prev").value.trim() || "0",
    pregnant: !!(el("np_preg") && el("np_preg").checked),
    phone: el("np_phone").value.trim(), sha: el("np_sha").value.trim(),
    residence: el("np_residence").value.trim(),
    nok: el("np_nok").value.trim(), nokContact: el("np_nokphone").value.trim(),
    allergies: el("np_allergies") ? el("np_allergies").value.trim() : "",
    createdAt: new Date() };
  const btn = el("np_save"); btn.disabled = true;
  try{
    const ref = await db.collection("patients").add(rec);
    await audit("Patient registered ("+rec.code+")", ref.id);

    await selectPatient(ref.id);
  }catch(e){ toast("Save failed: "+e.message, true); btn.disabled=false; }
}

/* ── Patient File — consolidated live record ── */
async function buildPatientFile(patientId){
  const wrap = el("patientFileCard"); if(!wrap) return;
  wrap.innerHTML = `<div class="loading"><span class="spin"></span></div>`;
  let rows = [];
  try{
    const snap = await db.collection("encounters").where("patientId","==",patientId).get();
    rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b)=>(toDate(a.at)?.getTime()||0)-(toDate(b.at)?.getTime()||0));
  }catch(e){ wrap.innerHTML=`<p class="hint">Could not load file: ${esc(e.message)}</p>`; return; }

  const p = activePatient;
  const ICONS = {
    triage:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    history:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 7h10M9 12h10M9 17h6M5 7h.01M5 12h.01M5 17h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
    labs:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 3v10.6l-3.5 5.8A2 2 0 0 0 7.2 22h9.6a2 2 0 0 0 1.7-3.1L15 13.6V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 3h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
    diagnosis:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    treatment:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/></svg>`,
    billing:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.8"/></svg>`,
    repro:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 21s-6-3.7-6-9a6 6 0 0 1 12 0c0 5.3-6 9-6 9z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/></svg>`,
  };

  function secHead(kind, time){
    const ic = ICONS[kind]||ICONS.history;
    const label = kind.charAt(0).toUpperCase()+kind.slice(1);
    return `<div class="pfile-sec-head">
      <span class="pfile-sec-icon ${kind}">${ic}</span>
      <span class="pfile-sec-title">${esc(label)}</span>
      ${time?`<span class="pfile-sec-time">${fmtTime(time)}</span>`:""}
    </div>`;
  }

  /* Group by kind, keep latest per kind (except treatment/billing keep all) */
  const byKind = {};
  rows.forEach(r=>{
    if(!byKind[r.kind]) byKind[r.kind]=[];
    byKind[r.kind].push(r);
  });

  const ORDER = ["triage","history","labs","diagnosis","treatment","repro","billing"];
  let sections = "";

  ORDER.forEach(kind=>{
    const enc = byKind[kind]; if(!enc||!enc.length) return;
    const latest = enc[enc.length-1];
    const pl = latest.payload||{};
    let body = "";

    if(kind==="triage"){
      const pts = pl.pts||{};
      body = `<div class="pfile-kv">
        <span>MEWS <b>${pl.score??pl.band??"—"}</b></span>
        <span>Band <b>${esc(pl.band||"—")}</b></span>
        <span>HR <b>${pl.hr??"—"}</b></span>
        <span>RR <b>${pl.rr??"—"}</b></span>
        <span>BP <b>${pl.sbp??"—"}</b></span>
        <span>Temp <b>${pl.temp??"—"}</b></span>
        <span>AVPU <b>${esc(pl.avpu||"—")}</b></span>
      </div>`;
    }
    else if(kind==="history"){
      body = pl.note
        ? `<div class="pfile-note">${esc(pl.note)}</div>`
        : `<p class="pfile-empty">${esc(latest.summary||"History recorded")}</p>`;
    }
    else if(kind==="labs"){
      const results = pl.results||[];
      if(results.length){
        body = `<div class="pfile-kv">${results.map(r=>`<span>${esc(r.name)} <b>${esc(r.value||"ordered")}${r.unit?" "+esc(r.unit):""}${r.flag?" ("+esc(r.flag)+")":""}</b></span>`).join("")}</div>`;
      } else body = `<p class="pfile-empty">Labs ordered.</p>`;
    }
    else if(kind==="diagnosis"){
      const dx = pl;
      body = `<div class="pfile-kv" style="flex-direction:column;gap:6px">
        ${dx.primary?`<span>Primary: <b>${esc(dx.primary)}${dx.primaryICD?" · "+esc(dx.primaryICD):""}</b></span>`:""}
        ${dx.diff1?`<span>Differential 1: <b>${esc(dx.diff1)}${dx.diff1ICD?" · "+esc(dx.diff1ICD):""}</b></span>`:""}
        ${dx.diff2?`<span>Differential 2: <b>${esc(dx.diff2)}${dx.diff2ICD?" · "+esc(dx.diff2ICD):""}</b></span>`:""}
        ${dx.confidence?`<span style="color:var(--ink-faint);font-size:12px">${esc(dx.confidence)}</span>`:""}
      </div>`;
    }
    else if(kind==="treatment"){
      const allItems = enc.flatMap(e=>(e.payload?.items||[]));
      body = allItems.length
        ? `<div class="pfile-kv" style="flex-direction:column;gap:4px">${allItems.map(i=>`<span><b>${esc(i.drug)}</b> — ${esc(i.dose)} ${esc(i.route||"")}${i.duration?" × "+esc(i.duration)+"d":""}</span>`).join("")}</div>`
        : `<p class="pfile-empty">${esc(latest.summary||"Treatment recorded")}</p>`;
    }
    else if(kind==="repro"){
      const sub = pl.subtype||"anc";
      if(sub==="anc"){
        body = `<div class="pfile-kv">
          <span>Visit <b>${esc(pl.visit||"ANC")}</b></span>
          <span>GA <b>${pl.weeks!=null?pl.weeks+"w":"—"}</b></span>
          ${pl.bp?`<span>BP <b>${esc(pl.bp)}</b></span>`:""}
          ${pl.weight?`<span>Wt <b>${esc(pl.weight)} kg</b></span>`:""}
          ${pl.fhr?`<span>FHR <b>${esc(pl.fhr)} bpm</b></span>`:""}
          ${pl.hiv?`<span>HIV <b>${esc(pl.hiv)}</b></span>`:""}
          ${pl.refer?`<span style="color:var(--alert)">Pathway <b>Obstetric review</b></span>`:`<span>Pathway <b>Routine ANC</b></span>`}
        </div>`;
      } else if(sub==="natal"){
        body = `<div class="pfile-kv">
          <span>Mode <b>${esc(pl.mode||"—")}</b></span>
          ${pl.bwt?`<span>Birth wt <b>${esc(pl.bwt)} kg</b></span>`:""}
          ${pl.apgar1?`<span>Apgar 1min <b>${esc(pl.apgar1)}</b></span>`:""}
          ${pl.apgar5?`<span>Apgar 5min <b>${esc(pl.apgar5)}</b></span>`:""}
          ${pl.complications&&pl.complications.length?`<span>Complications <b>${esc(pl.complications.join(", "))}</b></span>`:""}
        </div>`;
      } else if(sub==="pnc"){
        body = `<div class="pfile-kv">
          <span>Visit <b>${esc(pl.visit||"PNC")}</b></span>
          ${pl.days!=null?`<span>Day <b>${pl.days}</b></span>`:""}
          ${pl.refer&&pl.refer!=="no"?`<span style="color:var(--alert)">Referral <b>${esc(pl.refer)}</b></span>`:`<span>Referral <b>None</b></span>`}
        </div>`;
      } else if(sub==="fp"){
        body = `<div class="pfile-kv">
          <span>Method <b>${esc(pl.method||"—")}</b></span>
          ${pl.nextReview?`<span>Next review <b>${esc(pl.nextReview)}</b></span>`:""}
        </div>`;
      }
    }
    else if(kind==="billing"){
      const all = enc;
      const totalBilled = all.reduce((s,e)=>s+(e.payload?.total||0),0);
      const totalCopay  = all.reduce((s,e)=>s+(e.payload?.copay||0),0);
      const methods = [...new Set(all.map(e=>e.payload?.payMethod||"sha").filter(Boolean))];
      body = `<div class="pfile-kv">
        <span>Total billed <b>${money(totalBilled)}</b></span>
        <span>Patient co-pay <b>${money(totalCopay)}</b></span>
        <span>Method <b>${methods.map(m=>m.toUpperCase()).join(", ")||"—"}</b></span>
      </div>`;
    }

    sections += `<div class="pfile-section">
      ${secHead(kind, latest.at)}
      ${body}
    </div>`;
  });

  if(!sections){
    wrap.innerHTML = `<p class="pfile-empty" style="padding:12px 0;text-align:center">No encounters recorded yet. Use the clinical tabs above to build this patient's record.</p>`;
    return;
  }

  wrap.innerHTML = `
    <div class="pfile">${sections}</div>
    <div class="pfile-actions">
      <button class="btn btn--primary btn--sm" onclick="downloadPatientFile()">Download file</button>
      <button class="btn btn--ghost btn--sm" onclick="printPatientFile()">Print</button>
    </div>`;
}

function downloadPatientFile(){
  const html = buildPatientFileHTML();
  const p = activePatient||{};
  const url = URL.createObjectURL(new Blob([html],{type:"text/html"}));
  const a = document.createElement("a");
  a.href=url; a.download=`patient_file_${p.code||"record"}.html`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  audit("Patient file downloaded", p.id);
}

function printPatientFile(){
  const html = buildPatientFileHTML();
  const w = window.open("","_blank");
  w.document.write(html);
  w.document.close();
  w.onload = ()=>{ w.print(); };
  audit("Patient file printed", activePatient?activePatient.id:null);
}

async function loadEncounters(patientId){
  let rows = [];
  try{
    const snap = await db.collection("encounters").where("patientId","==",patientId).get();
    rows = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    rows.sort((a,b)=> (toDate(b.at)?.getTime()||0) - (toDate(a.at)?.getTime()||0));
  }catch(e){ toast("Couldn't load encounters: "+e.message, true); }

  // ledger from billing encounters
  const bills = rows.filter(r=>r.kind==="billing");
  const billed = bills.reduce((s,r)=>s+(r.payload?.total||0),0);
  const covered = bills.reduce((s,r)=>s+(r.payload?.covered||0),0);
  const copay = bills.reduce((s,r)=>s+(r.payload?.copay||0),0);
  /* update tab badges + pipeline */
  updateTabBadges(rows);
  encounterKinds = new Set(rows.map(r => r.kind === "maternity" ? "repro" : r.kind));
  /* treatment kind stored as "treatment" in old records, "dosing" tab — normalise */
  if(encounterKinds.has("treatment")) encounterKinds.add("treatment");
  renderCtx();
  const led = el("d_ledger");
  if(led) led.innerHTML = `
    <div class="lcell"><div class="l">Billed</div><div class="v">${money(billed)}</div></div>
    <div class="lcell"><div class="l">SHA covered</div><div class="v">${money(covered)}</div></div>
    <div class="lcell"><div class="l">Patient co-pay</div><div class="v">${money(copay)}</div></div>`;

  const tl = el("d_timeline"); if(!tl) return;
  if(!rows.length){ tl.innerHTML = `<div class="tl-empty">No encounters recorded yet.</div>`; return; }
  tl.innerHTML = `<div class="timeline">` + rows.map(r=>`
    <div class="tl-item"><span class="tl-dot k-${esc(r.kind)}"></span>
      <div class="tl-body"><div class="tl-kind">${esc(r.kind)}</div>

        <div class="tl-meta">${esc(r.by||"—")} · ${fmtTime(r.at)}</div></div></div>`).join("") + `</div>`;
  /* rebuild patient file card whenever encounters update */
  if(activePatient && activePatient.id===patientId) buildPatientFile(patientId);
}

async function addEncounter(kind, payload, summary){
  if(!activePatient){ toast("Select a patient first", true); return false; }
  const rec = { patientId: activePatient.id, kind, payload, summary, by: CURRENT.email, at: new Date() };
  try{
    await db.collection("encounters").add(rec);
    await audit(summary, activePatient.id);
    /* Update pipeline immediately — don't wait for full reload */
    encounterKinds.add(kind === "maternity" ? "repro" : kind);
    renderCtx();
    loadEncounters(activePatient.id);
    return true;
  }catch(e){ toast("Save failed: "+e.message, true); return false; }
}

/* ============================================================
   TRIAGE — MEWS (Subbe et al., 2001)
   ============================================================ */
let lastMews = null;
function mewsScore(v){
  const pts = {};
  const sbp=v.sbp, hr=v.hr, rr=v.rr, temp=v.temp, avpu=v.avpu;
  pts.sbp  = sbp==null?0 : sbp<=70?3 : sbp<=80?2 : sbp<=100?1 : sbp<=199?0 : 2;
  pts.hr   = hr==null?0  : hr<40?2  : hr<=50?1  : hr<=100?0  : hr<=110?1 : hr<=129?2 : 3;
  pts.rr   = rr==null?0  : rr<9?2   : rr<=14?0  : rr<=20?1   : rr<=29?2  : 3;
  pts.temp = temp==null?0: temp<35?2: temp<=38.4?0 : 2;
  pts.avpu = avpu==="A"?0 : avpu==="V"?1 : avpu==="P"?2 : 3;
  const total = pts.sbp+pts.hr+pts.rr+pts.temp+pts.avpu;
  const anyThree = Object.values(pts).some(x=>x>=3);
  let band, cls, action;
  if(total>=5 || anyThree){ band="High risk"; cls="is-high"; action="Urgent clinician review; consider continuous monitoring. Escalate per protocol."; }
  else if(total>=3){ band="Medium risk"; cls="is-med"; action="Increase monitoring frequency and review by a clinician."; }
  else { band="Low risk"; cls="is-low"; action="Routine monitoring."; }
  return { pts, total, band, cls, action };
}
function triageCalc(){
  const v = { rr:num(el("t_rr").value), hr:num(el("t_hr").value), sbp:num(el("t_sbp").value), temp:num(el("t_temp").value), avpu:el("t_avpu").value };
  if([v.rr,v.hr,v.sbp,v.temp].every(x=>x==null)){ toast("Enter at least one vital", true); return; }
  const r = mewsScore(v); lastMews = { v, r };
  const out = el("triageOut"); out.className = "readout "+r.cls;
  out.querySelector(".readout__body").innerHTML = `
    <p class="readout__label">MEWS</p>
    <p class="readout__value">${r.total} · ${esc(r.band)}</p>
    <p class="readout__meta">${esc(r.action)}</p>
    <div class="readout__rows">
      <div class="rrow"><span class="k">Resp rate</span><span class="v">${v.rr??"—"} → ${r.pts.rr}</span></div>
      <div class="rrow"><span class="k">Heart rate</span><span class="v">${v.hr??"—"} → ${r.pts.hr}</span></div>
      <div class="rrow"><span class="k">Systolic BP</span><span class="v">${v.sbp??"—"} → ${r.pts.sbp}</span></div>
      <div class="rrow"><span class="k">Temperature</span><span class="v">${v.temp??"—"} → ${r.pts.temp}</span></div>
      <div class="rrow"><span class="k">AVPU</span><span class="v">${esc(v.avpu)} → ${r.pts.avpu}</span></div>
    </div>
    <p class="readout__note">MEWS (Subbe et al., 2001). Decision support only — confirm against local escalation policy.</p>`;
  el("triageSaveBtn").disabled = !activePatient;
}
async function triageSave(){
  if(!lastMews){ toast("Calculate first", true); return; }
  const { v, r } = lastMews;
  const ok = await addEncounter("triage", { ...v, score:r.total, band:r.band, pts:r.pts }, `MEWS ${r.total} · ${r.band}`);
  if(ok){ toast("Triage recorded"); el("triageSaveBtn").disabled = true; }
}

function collectHistory(){
  const p = activePatient || {}; const age = num(p.age); const paeds = historyMode==="paeds";
  const g = id => (el(id) ? el(id).value.trim() : "");
  let og = "";
  if(el("h_grav") || el("h_menarche")){ const parts=[];
    if(el("h_preg") && el("h_preg").checked) parts.push("currently pregnant");
    if(g("h_menarche"))parts.push("menarche "+g("h_menarche"));
    if(g("h_oglmp"))parts.push("LMP "+g("h_oglmp"));
    if(g("h_cycle"))parts.push("cycle "+g("h_cycle"));
    if(g("h_flow"))parts.push("flow/regularity "+g("h_flow"));
    const gp=g("h_grav")||g("h_para"); if(gp)parts.push("G"+g("h_grav")+"P"+g("h_para"));
    if(g("h_obs"))parts.push("previous pregnancies: "+g("h_obs"));
    if(g("h_contra"))parts.push("contraception "+g("h_contra"));
    if(g("h_pap"))parts.push("last Pap "+g("h_pap"));
    if(g("h_gynae"))parts.push("gynae: "+g("h_gynae"));
    og=parts.join("; "); }
  let paedsHx = "";
  if(paeds){ const parts=[];
    if(g("h_ante"))parts.push("antenatal — "+g("h_ante"));
    if(g("h_natal"))parts.push("natal — "+g("h_natal"));
    if(g("h_postnatal"))parts.push("postnatal — "+g("h_postnatal"));
    const feed=[g("h_bf")&&("breastfeeding "+g("h_bf")), g("h_wean")&&("weaning "+g("h_wean")), g("h_diet")&&("diet "+g("h_diet"))].filter(Boolean).join(", ");
    if(feed)parts.push("feeding — "+feed);
    const imm=[g("h_immun"), g("h_bcg")&&("BCG scar "+g("h_bcg"))].filter(Boolean).join(", ");
    if(imm)parts.push("immunisation — "+imm);
    const dev=[g("h_devmotor")&&("motor/vision "+g("h_devmotor")), g("h_devspeech")&&("speech/social "+g("h_devspeech"))].filter(Boolean).join(", ");
    if(dev)parts.push("development — "+dev);
    if(g("h_growth"))parts.push("growth — "+g("h_growth"));
    paedsHx=parts.join("; "); }
  return {
    age, sex:p.sex||"", mode:historyMode, weight:p.weight||"", prevAdmissions:p.prevAdmissions||"0",
    symptoms: $$("#h_symptoms .chip.on").map(c=>c.dataset.s), otherSymptom:g("h_other"),
    durValue:g("h_durval"), durUnit:(el("h_durunit")?el("h_durunit").value:"Days"),
    hpi:{ site:g("h_site"), onset:g("h_onset"), character:g("h_char"), radiation:g("h_rad"), assoc:g("h_assoc"), timing:g("h_time"), exac:g("h_exac"), severity:g("h_sev") },
    pmh: $$("#h_pmh .check input:checked").map(i=>i.value), pmhNotes:g("h_pmhnotes"),
    drugs:g("h_drugs"), surgical:g("h_surg"), family:g("h_family"), social:g("h_social"),
    og, paeds:paedsHx, ros:g("h_ros")
  };
}

function historyToText(h){
  const L=[]; const s=h.hpi; const isP = h.mode==="paeds";
  L.push(`Patient: ${h.age!=null?h.age+"y":"age unknown"} ${h.sex||""}${isP?" (paediatric)":""}${h.weight?", "+h.weight+" kg":""}.`);
  const cc=[...h.symptoms, h.otherSymptom].filter(Boolean);
  if(cc.length) L.push(`PRESENTING COMPLAINT: ${cc.join(", ")}${h.durValue?` for ${h.durValue} ${h.durUnit.toLowerCase()}`:""}.`);
  const soc=[];
  if(s.site)soc.push("Site: "+s.site); if(s.onset)soc.push("Onset: "+s.onset); if(s.character)soc.push("Character: "+s.character);
  if(s.radiation)soc.push("Radiation: "+s.radiation); if(s.assoc)soc.push("Associations: "+s.assoc); if(s.timing)soc.push("Time course: "+s.timing);
  if(s.exac)soc.push("Exacerbating/relieving: "+s.exac); if(s.severity)soc.push("Severity: "+s.severity);
  if(soc.length) L.push("HISTORY OF PRESENTING ILLNESS (SOCRATES) — "+soc.join("; ")+".");
  if(isP && h.paeds) L.push("BIRTH, FEEDING, IMMUNISATION & DEVELOPMENT: "+h.paeds+".");
  const pmh=[...h.pmh.filter(x=>x!=="None known"), h.pmhNotes].filter(Boolean);
  L.push(`PAST MEDICAL HISTORY: ${pmh.length?pmh.join(", "):"none reported"}. Previous admissions: ${h.prevAdmissions}.`);
  if(h.drugs) L.push("DRUG HISTORY & ALLERGIES: "+h.drugs+".");
  if(h.surgical) L.push("PAST SURGICAL HISTORY: "+h.surgical+".");
  if(h.family) L.push("FAMILY HISTORY: "+h.family+".");
  if(h.social) L.push((isP?"SOCIAL HISTORY: ":"SOCIAL / SOCIOECONOMIC HISTORY: ")+h.social+".");
  if(h.og) L.push("OBSTETRIC & GYNAECOLOGICAL HISTORY: "+h.og+".");
  if(h.ros) L.push("REVIEW OF SYSTEMS: "+h.ros+".");
  return L.join("\n");
}

async function historySave(){

/* ---- Afya AI differential engine ---- */
let lastDx = null;
async function runDiagnosis(){
  const h = collectHistory();
  if(!h.symptoms.length && !h.otherSymptom && !h.hpi.site){ toast("Enter the history first", true); return; }
  const out = el("dxOut"); const btn = el("dxBtn");
  out.innerHTML = `<div class="loading"><span class="spin"></span></div>`;
  btn.disabled = true;
  const labs = getLabResults();
  const labLine = labs.length ? "\n\nLAB RESULTS: " + labs.map(r=>`${r.name}: ${r.value||"ordered"}${r.flag&&r.value?" ("+r.flag+")":""}`).join("; ") + "." : "";
  const prompt =
    "You are Afya AI, clinical decision-support for clinicians in Kenya. Base reasoning on Kenya MOH and WHO guidelines and the local disease burden (malaria, respiratory tract infections, TB, HIV, diarrhoeal disease, typhoid, UTI, hypertension, diabetes, injury, maternal & neonatal conditions). "
    + "You assist a QUALIFIED clinician and must NOT give a definitive diagnosis. Be concise and conservative. Do NOT give drug doses; defer management to guidelines. Always surface red-flag features. "
    + "Age band: " + (h.mode==="paeds"?"paediatric":"adult") + ". "
    + 'Return ONLY minified JSON with this exact shape: {"differentials":[{"condition":"","likelihood":"high|moderate|low","rationale":"","icd10":""}],"investigations":[""],"redFlags":[""],"guidelineNote":"","confidenceNote":""}. '
    + "icd10 must be the correct ICD-10-CM code for that condition (e.g. B50.9, A01.0, J18.9). confidenceNote is one sentence on what exam finding or investigation would most narrow the differential. 3 to 6 differentials, most likely first.\n\nDE-IDENTIFIED SUMMARY:\n" + historyToText(h) + labLine;
  try{
    const res = await fetch(CONFIG.aiEndpoint, {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, messages:[{ role:"user", content: prompt }] })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    const clean = text.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
    let parsed=null; try{ parsed = JSON.parse(clean); }catch(_){}
    if(parsed){ lastDx = parsed; renderDx(parsed); }
    else out.innerHTML = `<pre class="note">${esc(text||"No response.")}</pre>`;
    audit("Afya AI differential generated", activePatient ? activePatient.id : null);
  }catch(e){
    out.innerHTML = `<div class="gate" style="text-align:left;padding:18px 20px"><p>Afya AI unavailable here (${esc(e.message)}). In production, route via your backend holding the API key.</p></div>`;
  }finally{ btn.disabled = false; }
}
function renderDx(d){
  const out = el("dxOut");
  const diffs = (d.differentials||[]).map((x,i)=>{
    const lk = String(x.likelihood||"").toLowerCase();
    const icd = x.icd10 ? `<span style="font-family:var(--data);font-size:11px;background:var(--petrol-050);color:var(--petrol-700);border:1px solid var(--petrol);border-radius:4px;padding:2px 7px;margin-left:6px;vertical-align:middle">${esc(x.icd10)}</span>` : "";
    return `<div class="dx-item" style="margin-bottom:10px">
      <div class="dx-cond" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span style="font-weight:600;font-size:14px">${esc(x.condition||"")}${icd}</span>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${lk?`<span class="lk ${esc(lk)}">${esc(x.likelihood)}</span>`:""}
          <button class="dx-set-btn" onclick="setAsDiagnosis(${i})">Set as diagnosis</button>
        </div>
      </div>
      ${x.rationale?`<div class="dx-rat" style="margin-top:5px">${esc(x.rationale)}</div>`:""}
    </div>`;
  }).join("");
  const inv = (d.investigations||[]).map(i=>`<li>${esc(i)}</li>`).join("");
  const rf  = (d.redFlags||[]).map(i=>`<li>${esc(i)}</li>`).join("");
  out.innerHTML = `<div class="dx">
    <div><div class="tl-h">Suggested differentials</div>${diffs||'<p class="hint">None returned.</p>'}</div>
    ${inv?`<div><div class="tl-h">Suggested investigations</div><ul class="dx-list">${inv}</ul></div>`:""}
    ${rf?`<div class="redflags"><div class="l">Red flags — escalate if present</div><ul class="dx-list" style="margin-top:6px">${rf}</ul></div>`:""}
    ${d.confidenceNote?`<div class="alert-box alert-box--info" style="margin-top:12px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span style="font-size:12.5px">${esc(d.confidenceNote)}</span></div>`:""}
    ${d.guidelineNote?`<div><div class="tl-h">Guideline note</div><p style="font-size:13.5px;margin:0;color:var(--ink-soft)">${esc(d.guidelineNote)}</p></div>`:""}
    <p class="dx-disc" style="margin-top:12px">Afya AI · decision support grounded in MOH/WHO guidance. Suggestions only — the treating clinician is responsible for all diagnostic and management decisions.</p>
  </div>`;
  /* show referral button + update lab indicator */
  const refBtn = el("referralBtn"); if(refBtn) refBtn.style.display="";
  refreshDxLabIndicator();
}

function setAsDiagnosis(idx){
  if(!lastDx||!lastDx.differentials) return;
  const d = lastDx.differentials[idx];
  /* Fill primary if empty, else diff1, else diff2 */
  const fields = [
    {name:"dx_primary",icd:"dx_primaryICD",chip:"dx_primaryICDChip"},
    {name:"dx_diff1",  icd:"dx_diff1ICD",  chip:"dx_diff1ICDChip"},
    {name:"dx_diff2",  icd:"dx_diff2ICD",  chip:"dx_diff2ICDChip"},
  ];
  let placed = false;
  for(const f of fields){
    if(!el(f.name).value.trim()){
      el(f.name).value = d.condition||"";
      if(d.icd10){ el(f.icd).value = d.icd10; renderICDChip(f.chip, d.icd10); }
      placed = true; break;
    }
  }
  if(!placed){
    /* All filled — overwrite primary */
    el(fields[0].name).value = d.condition||"";
    if(d.icd10){ el(fields[0].icd).value = d.icd10; renderICDChip(fields[0].chip, d.icd10); }
  }
  toast("Added to working diagnosis form");
}

/* ICD-10 lookup via Afya AI (single call per button click) */
async function lookupICD(condField, icdField, chipId){
  const condition = el(condField).value.trim();
  if(!condition){ toast("Enter a condition name first", true); return; }
  const btn = event.target; btn.disabled=true; btn.textContent="…";
  const prompt = `You are a medical coding assistant. The clinician has recorded this condition: "${condition}". Return ONLY the single most appropriate ICD-10-CM code for this condition (e.g. B50.9). No explanation, no punctuation, just the code.`;
  try{
    const res = await fetch(CONFIG.aiEndpoint,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6", max_tokens:20, messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const code = ((data.content||[])[0]?.text||"").trim().replace(/[^A-Z0-9.]/gi,"").toUpperCase();
    if(code){ el(icdField).value = code; renderICDChip(chipId, code); toast("ICD-10: "+code); }
    else toast("Could not determine code — enter manually", true);
  }catch(e){ toast("ICD-10 lookup failed: "+e.message, true); }
  finally{ btn.disabled=false; btn.textContent="ICD-10 →"; }
}

function renderICDChip(chipId, code){
  const chip = el(chipId); if(!chip) return;
  chip.innerHTML = `<span class="dx-icd-result">✓ ${esc(code)}</span>`;
}

async function fpSave(){
  const method = el("fp_new")?.value;
  const payload = {
    subtype:"fp", currentMethod:el("fp_current")?.value,
    method, nextReview:el("fp_next")?.value,
    notes:el("fp_notes")?.value
  };
  const summary = `FP: ${method||"counselling only"} · Next review: ${el("fp_next")?.value||"—"}`;
  /* Auto-add contraceptive to treatment sheet */
  if(method && FP_DRUG_MAP[method]){
    const cls = "Contraceptives";
    const drugId = FP_DRUG_MAP[method];
    const drug = (DRUG_CLASSES[cls]||[]).find(d=>d.id===drugId);
    if(drug){
      const inv = invForDrug(drug.id);
      const isNIS = !inv || inv.stock<=0;
      txSheet.push({
        id:Date.now(), drugId:drug.id, drugName:drug.name, form:drug.form,
        dose:txBuildAdultDose(drug), route:drug.route||"PO",
        duration:String(drug.days||""), notes:(drug.notes||"")+" [From FP consultation]",
        isNIS, isCustom:false, paedWeight:null
      });
      if(el("tx_sheetWrap")) renderTxSheet();
      toast("Added to treatment sheet: "+drug.name);
    }
  }
  const ok = await addEncounter("repro", payload, summary);
  if(ok){ toast("FP consultation saved");
    autoBillLine("FP", 1);
  }
}

let lastClaim = null;
let billPayMethod = "sha"; // "sha" | "cash" | "mpesa"

function renderBillLines(){
  const wrap = el("billLinesWrap"); if(!wrap) return;
  const cats = [...new Set(SHA_PACKAGES.map(p=>p.category))];
  wrap.innerHTML = cats.map(cat=>{
    const items = SHA_PACKAGES.filter(p=>p.category===cat);
    return `<div class="bill-cat-head">${esc(cat)}</div>`
      + items.map((p,_)=>{
          const idx = SHA_PACKAGES.indexOf(p);
          const custAmt = p.customAmount
            ? `<input class="bl-amt" id="blamt_${idx}" type="number" min="0" placeholder="KES" oninput="billUpdateLine(${idx})">`
            : `<span class="bl-tariff">${money(p.tariff)}</span>`;
          return `<label class="bill-line" id="bline_${idx}">
            <input type="checkbox" id="blchk_${idx}" onchange="billToggleLine(${idx})">
            <span class="bl-label">${esc(p.label)}</span>
            ${custAmt}
            <input class="bl-qty" id="blqty_${idx}" type="number" min="1" value="1" oninput="billUpdateLine(${idx})">
          </label>`;
        }).join("");
  }).join("");
}

function billToggleLine(idx){
  const on = el("blchk_"+idx).checked;
  el("bline_"+idx).classList.toggle("on", on);
}

function billUpdateLine(idx){ /* triggers re-calc on custom amount change */ }

function billSelectPay(method, btn){
  billPayMethod = method;
  $$(".pay-pill").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  el("billShaNote").style.display  = method==="sha"   ? "flex"  : "none";
  el("billMpesaRef").style.display = method==="mpesa" ? "block" : "none";
  /* Update badge */
  const badge = el("billPayBadge");
  if(badge) badge.innerHTML = `<span class="receipt-badge ${method}">${method.toUpperCase()}</span>`;
  if(lastClaim) billCalc(); /* refresh preview if already calculated */
}

function billGetLines(){
  return SHA_PACKAGES.map((p,idx)=>{
    const chk = el("blchk_"+idx); if(!chk||!chk.checked) return null;
    const qty  = Math.max(1, parseInt(el("blqty_"+idx).value)||1);
    const tariff = p.customAmount
      ? (parseFloat((el("blamt_"+idx)||{}).value)||0)
      : p.tariff;
    const subtotal = tariff*qty;
    const covered  = billPayMethod==="sha" ? Math.round(subtotal*p.cover) : 0;
    const copay    = subtotal-covered;
    return { code:p.code, label:p.label, category:p.category, tariff, qty, subtotal, covered, copay, cover:p.cover };
  }).filter(Boolean);
}

function billCalc(){
  const lines = billGetLines();
  if(!lines.length){ toast("Select at least one service line", true); return; }
  const grandTotal   = lines.reduce((s,l)=>s+l.subtotal,0);
  const grandCovered = lines.reduce((s,l)=>s+l.covered,0);
  const grandCopay   = lines.reduce((s,l)=>s+l.copay,0);
  lastClaim = { lines, total:grandTotal, covered:grandCovered, copay:grandCopay, payMethod:billPayMethod, mpesaRef:el("billMpesaCode")?el("billMpesaCode").value.trim():"", notes:el("billNotes")?el("billNotes").value.trim():"" };

  const isSha = billPayMethod==="sha";
  const isMpesa = billPayMethod==="mpesa";

  /* Build receipt rows */
  const lineRows = lines.map(l=>`
    <div class="receipt-row">
      <span class="rk">${esc(l.label)}${l.qty>1?` ×${l.qty}`:""}</span>
      <span class="rv">${money(l.subtotal)}</span>
    </div>
    ${isSha && l.covered>0 ? `<div class="receipt-row" style="font-size:12px;color:var(--petrol-700)">
      <span class="rk" style="padding-left:10px">&#8627; SHA covers ${Math.round(l.cover*100)}%</span>
      <span class="rv" style="color:var(--petrol-700)">${money(l.covered)}</span>
    </div>` : ""}
  `).join("");

  const methodLabel = isSha ? "SHA" : isMpesa ? "M-Pesa" : "Cash";
  const mpesaLine = (isMpesa && lastClaim.mpesaRef) ? `<div class="receipt-row"><span class="rk">M-Pesa Ref</span><span class="rv">${esc(lastClaim.mpesaRef)}</span></div>` : "";

  el("billOut").innerHTML = `
    <div class="receipt-lines">
      ${lineRows}
      <div style="border-top:1px solid var(--line);margin:4px 0;"></div>
      <div class="receipt-row"><span class="rk"><strong>Gross total</strong></span><span class="rv"><strong>${money(grandTotal)}</strong></span></div>
      ${isSha ? `<div class="receipt-row" style="color:var(--petrol-700)"><span class="rk">SHA covered</span><span class="rv">${money(grandCovered)}</span></div>` : ""}
      <div class="receipt-total">
        <span>${isSha ? "Patient co-pay" : "Amount due"}</span>
        <span class="rv">${money(isSha ? grandCopay : grandTotal)}</span>
      </div>
      ${mpesaLine}
      ${lastClaim.notes ? `<div class="receipt-row"><span class="rk">Notes</span><span class="rv" style="max-width:180px;text-align:right">${esc(lastClaim.notes)}</span></div>` : ""}
    </div>
    <p style="font-size:11.5px;color:var(--ink-faint);margin:14px 0 0;line-height:1.5;">Example tariffs — confirm against your contracted SHA benefit schedule before filing.</p>`;

  /* Update badge */
  const badge = el("billPayBadge");
  if(badge) badge.innerHTML = `<span class="receipt-badge ${billPayMethod}">${methodLabel}</span>`;
  el("billFileBtn").disabled = !activePatient;
}

async function billFile(){
  if(!lastClaim){ toast("Calculate first", true); return; }
  const c = lastClaim;
  const linesSummary = c.lines.map(l=>l.label+(l.qty>1?" ×"+l.qty:"")).join(", ");
  const summary = `[${c.payMethod.toUpperCase()}] ${linesSummary} · ${money(c.total)}${c.copay<c.total?" (co-pay "+money(c.copay)+")":""}`;
  const ok = await addEncounter("billing", c, summary);
  if(ok){
    toast("Claim filed");
    el("billFileBtn").disabled = true;
    billPrintReceipt(c);
    audit("Receipt printed: "+summary, activePatient?activePatient.id:null);
  }
}

async function audit(action, patientId){
  try{ await db.collection("logs").add({ action, by: CURRENT.email, patientId: patientId||null, at: new Date() }); }catch(_){}
}
async function loadActivity(){
  const box = el("activityList"); if(!box) return;
  box.innerHTML = `<div class="loading"><span class="spin"></span></div>`;
  let rows = [];
  try{
    const snap = await db.collection("logs").orderBy("at","desc").limit(30).get();
    rows = snap.docs.map(d=>d.data());
  }catch(e){ box.innerHTML = `<div class="activity__empty">Couldn't load activity: ${esc(e.message)}</div>`; return; }
  if(!rows.length){ box.innerHTML = `<div class="activity__empty">No activity recorded yet.</div>`; return; }
  box.innerHTML = `<div class="activity">` + rows.map(r=>`
    <div class="act"><span class="what">${esc(r.action||"—")}</span>
      <span class="who">${esc(r.by||"system")}</span>
      <span class="when">${fmtTime(r.at)}</span></div>`).join("") + `</div>`;
}

/* --- inventory helpers --- */
function invForDrug(drugId){ return PHARMACY_INVENTORY.find(i=>i.drugId===drugId)||null; }

/* ============================================================
   TREATMENT — initialise class dropdown
   ============================================================ */
function initTxClassDropdown(){
  const sel = el("tx_classSelect"); if(!sel) return;
  Object.keys(DRUG_CLASSES).forEach(cls=>{
    const opt = document.createElement("option");
    opt.value = cls; opt.textContent = cls;
    sel.appendChild(opt);
  });
}

function onTxClassChange(){
  const cls = el("tx_classSelect").value;
  const drugSel = el("tx_drugSelect");
  el("tx_doseChip").style.display = "none";
  el("tx_weightRow").style.display = "none";
  el("tx_stockBanner").style.display = "none";
  clearTxAllergyAlert();
  if(!cls){ el("tx_drugField").style.display="none"; return; }
  drugSel.innerHTML = '<option value="">— Choose drug —</option>';
  DRUG_CLASSES[cls].forEach((drug,idx)=>{
    const opt = document.createElement("option");
    opt.value = idx;
    const inv = invForDrug(drug.id);
    let suffix = !inv ? " ✱ not in pharmacy" : inv.stock<=0 ? " ✱ out of stock" : "";
    opt.textContent = drug.name + " — " + drug.form + suffix;
    drugSel.appendChild(opt);
  });
  el("tx_drugField").style.display = "block";
  el("tx_customCheck").checked = false;
  el("tx_customFields").style.display = "none";
  el("tx_customLabel").classList.remove("on");
  prefillTxFields(null);
}

function onTxDrugChange(){
  const cls = el("tx_classSelect").value;
  const idx = el("tx_drugSelect").value;
  if(!cls || idx==="") { prefillTxFields(null); return; }
  const drug = DRUG_CLASSES[cls][parseInt(idx,10)];
  prefillTxFields(drug);
  checkTxAllergyAlert(drug);
  showTxStockBanner(drug);
}

function prefillTxFields(drug){
  const isPaeds = activePatient && num(activePatient.age)!=null && num(activePatient.age)<12;
  el("tx_doseChip").style.display = "none";
  el("tx_weightRow").style.display = "none";
  if(!drug){ el("tx_dose").value=""; el("tx_route").value="PO"; el("tx_duration").value=""; el("tx_notes").value=""; return; }
  el("tx_route").value = drug.route||"PO";
  el("tx_notes").value = drug.notes||"";
  el("tx_duration").value = drug.days||"";
  const hasMgKg = typeof drug.doseMgKg==="number";
  const hasBands = Array.isArray(drug.weightBands);
  if(isPaeds && (hasMgKg||hasBands)){
    el("tx_weightRow").style.display = "block";
    /* pre-fill weight from patient record */
    if(activePatient && activePatient.weight && !el("tx_weight").value)
      el("tx_weight").value = activePatient.weight;
    if(el("tx_weight").value) recalcTxDose();
    else el("tx_dose").value = "Enter weight to calculate dose";
  } else {
    el("tx_dose").value = txBuildAdultDose(drug);
  }
}

function txBuildAdultDose(drug){
  if(drug.defaultDose) return `${drug.defaultDose} ${drug.freq||""}${drug.days?" × "+drug.days+" days":""}`.trim();
  if(drug.weightBands){ const b=drug.weightBands[drug.weightBands.length-1]; return b.dose+" "+b.freq; }
  return "";
}

function recalcTxDose(){
  const cls = el("tx_classSelect").value;
  const idx = el("tx_drugSelect").value;
  if(!cls||idx==="") return;
  const drug = DRUG_CLASSES[cls][parseInt(idx,10)];
  const wt = parseFloat(el("tx_weight").value);
  const chip = el("tx_doseChip");
  if(!wt||!drug){ el("tx_dose").value="Enter weight to calculate dose"; return; }
  if(typeof drug.doseMgKg==="number"){
    const rawMg = drug.doseMgKg*wt;
    const mg = drug.maxMg ? Math.min(rawMg,drug.maxMg) : rawMg;
    el("tx_dose").value = `${mg.toFixed(1)} mg ${drug.freq||""} × ${drug.days||"?"} days`;
    chip.innerHTML = `<span class="dose-chip">⚖ ${drug.doseMgKg} mg/kg × ${wt} kg = ${mg.toFixed(1)} mg${drug.maxMg&&rawMg>drug.maxMg?" (max "+drug.maxMg+" mg)":""}</span>`;
    chip.style.display = "block";
  } else if(Array.isArray(drug.weightBands)){
    const band = drug.weightBands.find(b=>wt<=b.max);
    if(band){
      el("tx_dose").value = `${band.dose} ${band.freq} × ${band.days} days`;
      chip.innerHTML = `<span class="dose-chip">⚖ Weight ${wt} kg → ${band.dose} ${band.freq}</span>`;
      chip.style.display = "block";
    }
  }
}

function checkTxAllergyAlert(drug){
  clearTxAllergyAlert();
  if(!drug||!drug.allergyClass||!activePatient) return;
  /* read allergies from drug history field if present */
  const drugHx = (el("h_drugs")||{}).value||"";
  const hasAllergy = drugHx.toLowerCase().includes(drug.allergyClass.toLowerCase());
  if(hasAllergy){
    el("tx_allergyAlert").style.display = "flex";
    el("tx_allergyText").textContent = `⚠ Allergy alert: patient drug history mentions ${drug.allergyClass}. Review before prescribing.`;
  }
}
function clearTxAllergyAlert(){ if(el("tx_allergyAlert")) el("tx_allergyAlert").style.display="none"; }

function txAddDrug(){
  const isCustom = el("tx_customCheck").checked;
  let drugName, form, drugId=null, isNIS=false;
  if(isCustom){
    drugName = el("tx_customName").value.trim();
    form     = el("tx_customForm").value.trim();
    if(!drugName){ toast("Enter a drug name", true); return; }
    isNIS = true;
  } else {
    const cls = el("tx_classSelect").value;
    const idx = el("tx_drugSelect").value;
    if(!cls||idx===""){ toast("Select a drug first", true); return; }
    const drug = DRUG_CLASSES[cls][parseInt(idx,10)];
    drugName = drug.name; form = drug.form; drugId = drug.id;
    const inv = invForDrug(drug.id);
    isNIS = !inv || inv.stock<=0;
  }
  const dose = el("tx_dose").value.trim();
  if(!dose){ toast("Enter the dose / instructions", true); return; }
  const wt = el("tx_weight").value.trim();
  txSheet.push({
    id:Date.now(), drugId, drugName, form,
    dose, route:el("tx_route").value, duration:el("tx_duration").value.trim(),
    notes:el("tx_notes").value.trim(), isNIS, isCustom, paedWeight:wt||null
  });
  renderTxSheet();
  toast(drugName+" added to treatment sheet");
  clearTxForm();
}

function renderTxSheet(){
  const wrap = el("tx_sheetWrap"); if(!wrap) return;
  const cnt = el("tx_count"); if(cnt) cnt.textContent = txSheet.length ? "· "+txSheet.length+" item"+(txSheet.length>1?"s":"") : "";
  if(!txSheet.length){ wrap.innerHTML='<div class="tx-empty">No medications added yet.</div>'; el("txSaveBtn").disabled=true; const pb=el("txPrintBtn"); if(pb) pb.disabled=true; return; }
  const rows = txSheet.map(item=>`
    <tr>
      <td><div class="dn">${esc(item.drugName)} ${item.isNIS?`<span class="${item.isCustom?"badge-nis":"badge-oos"}">${item.isCustom?"Not in pharmacy":"Out of stock"}</span>`:""}</div>
          <div class="df">${esc(item.form)}</div></td>
      <td><div class="dd">${esc(item.dose)}</div>${item.paedWeight?`<div class="dp">⚖ ${esc(item.paedWeight)} kg</div>`:""}<div class="dnotes">${esc(item.notes)}</div></td>
      <td style="font-family:var(--data);font-size:12px;color:var(--ink-soft);white-space:nowrap">${esc(item.route)}</td>
      <td style="font-family:var(--data);font-size:12px;color:var(--ink-soft);white-space:nowrap">${item.duration?esc(item.duration)+"d":"—"}</td>
      <td><button class="tx-rm" onclick="txRemoveItem(${item.id})">✕</button></td>
    </tr>`).join("");
  wrap.innerHTML = `<table class="tx-table"><thead><tr><th>Drug</th><th>Dose</th><th>Route</th><th>Days</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
  el("txSaveBtn").disabled = false;
  const printBtn = el("txPrintBtn"); if(printBtn) printBtn.disabled = false;
}
function txRemoveItem(id){ txSheet=txSheet.filter(i=>i.id!==id); renderTxSheet(); }

async function txSaveSheet(){
  if(!txSheet.length){ toast("Add drugs to the sheet first",true); return; }
  const dispensed=[],notDispensed=[];
  txSheet.forEach(item=>{
    if(item.drugId&&!item.isNIS){
      const inv=invForDrug(item.drugId);
      if(inv&&inv.stock>0){ inv.stock--; pharmDispenses.unshift({name:inv.name,qty:1,unit:inv.unit,time:new Date()}); dispensed.push(item.drugName); }
    } else { notDispensed.push(item.drugName); }
  });
  const summary = "Treatment: "+txSheet.map(i=>i.drugName+" "+i.dose).slice(0,3).join("; ")+(txSheet.length>3?"…":"");
  const ok = await addEncounter("treatment", {items:txSheet.map(i=>({drug:i.drugName,dose:i.dose,route:i.route,duration:i.duration}))}, summary);
  if(ok){
    let msg = "Treatment saved.";
    if(dispensed.length) msg += " Dispensed: "+dispensed.join(", ")+".";
    if(notDispensed.length) msg += " Flagged for procurement: "+notDispensed.join(", ")+".";
    toast(msg);
    /* Auto-bill: medication dispensing fee */
    autoBillLine("DRUG", 1);
    txSheet=[]; renderTxSheet(); renderPharmacy();
  }
}
function txClearSheet(){ txSheet=[]; renderTxSheet(); }

}

   ============================================================ */
function renderPharmacy(){
  const grid = el("pharmGrid"); if(!grid) return;
  const inStockItems = PHARMACY_INVENTORY.filter(i=>i.stock>0);
  const lowItems = inStockItems.filter(i=>i.stock<=i.reorderLevel);
  const cntEl = el("pharmCount"); if(cntEl) cntEl.textContent = "· "+inStockItems.length+" of "+PHARMACY_INVENTORY.length+" items";
  const lb = el("pharmLowBanner");
  if(lb){
    if(lowItems.length){ lb.style.display="flex"; el("pharmLowText").innerHTML=`<strong>${lowItems.length} item${lowItems.length>1?"s":""} running low:</strong> `+lowItems.map(i=>esc(i.name)+" ("+i.stock+" "+esc(i.unit)+")").join(", ")+"."; }
    else lb.style.display="none";
  }
  if(!inStockItems.length){ grid.innerHTML='<p class="hint" style="padding:20px 0;text-align:center">No items currently in stock.</p>'; }
  else {
    grid.innerHTML = inStockItems.map(item=>{
      const pct = Math.min(100,Math.round((item.stock/(item.reorderLevel*4))*100));
      const isLow = item.stock<=item.reorderLevel;
      return `<div class="pharm-item">
        <div class="pharm-item__name">${esc(item.name)}</div>
        <div class="pharm-item__form">${esc(item.unit)}</div>
        <div class="pharm-item__stock ${isLow?"low":"ok"}">${item.stock} ${esc(item.unit)}${isLow?" ⚠":""}</div>
        <div class="stock-bar"><div class="stock-bar__fill${isLow?" low":""}" style="width:${pct}%"></div></div>
      </div>`;
    }).join("");
  }
  /* add-stock selector — all items including OOS */
  const pharmSel = el("pharmItemSelect"); if(!pharmSel) return;
  pharmSel.innerHTML = '<option value="">— Select —</option>';
  PHARMACY_INVENTORY.forEach(item=>{
    const opt=document.createElement("option"); opt.value=item.id;
    opt.textContent=item.name+(item.stock<=0?" (out of stock)":" ("+item.stock+" "+item.unit+")");
    pharmSel.appendChild(opt);
  });
  /* dispense log */
  const dl = el("pharmDispenses"); if(!dl) return;
  if(!pharmDispenses.length){ dl.innerHTML='<p class="hint" style="padding:8px 0;text-align:center">No dispenses recorded.</p>'; return; }
  dl.innerHTML = pharmDispenses.slice(0,10).map(d=>`
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;">
      <span>${esc(d.name)}</span>
      <span style="font-family:var(--data);font-size:11.5px;color:var(--ink-faint)">${d.qty} ${esc(d.unit)} · ${d.time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
    </div>`).join("");
}

function pharmAddStock(){
  const id=el("pharmItemSelect").value; const qty=parseInt(el("pharmQty").value,10);
  if(!id){ toast("Select an item",true); return; }
  if(!qty||qty<1){ toast("Enter a valid quantity",true); return; }
  const item=PHARMACY_INVENTORY.find(i=>i.id===id); if(!item){ toast("Item not found",true); return; }
  item.stock+=qty;
  el("pharmQty").value=""; el("pharmCost").value="";
  renderPharmacy();
  toast("Added "+qty+" "+item.unit+" of "+item.name);
  audit("Pharmacy: +"+qty+" "+item.name, null);
}

async function labSaveResults(){
  if(!labOrders.length){ toast("No tests ordered", true); return; }
  const results = labOrders.map(o=>({ name:o.name, code:o.code, status:o.status, value:o.value, unit:o.unit, flag:o.flag }));
  const withResults = results.filter(r=>r.value);
  const summary = withResults.length
    ? "Lab results: "+withResults.map(r=>r.name+(r.value?" "+r.value:"")+(r.flag?" ("+r.flag+")":"")).slice(0,3).join(", ")+(withResults.length>3?"…":"")
    : "Lab tests ordered: "+labOrders.map(o=>o.name).slice(0,4).join(", ");
  const ok = await addEncounter("labs", {results}, summary);
  if(ok){ toast("Lab results saved");
    /* Auto-bill: LAB_S × number of tests ordered */
    if(labOrders.length > 0) autoBillLine("LAB_S", labOrders.length);
  }
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener("keydown", e=>{
  if(e.key==="Escape"){ closeFab(); closeMoreDrawer(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==="s"){
    e.preventDefault();
    /* Save whichever panel is active */
    const active = $(".tab.is-active");
    if(!active) return;
    const tab = active.dataset.tab;
    if(tab==="triage" && el("triageSaveBtn") && !el("triageSaveBtn").disabled) el("triageSaveBtn").click();
    else if(tab==="history" && el("historySaveBtn")) el("historySaveBtn").click();
    else if(tab==="dosing" && el("txSaveBtn") && !el("txSaveBtn").disabled) el("txSaveBtn").click();
    else if(tab==="billing" && el("billFileBtn") && !el("billFileBtn").disabled) el("billFileBtn").click();
    else if(tab==="diagnosis" && el("dxSaveBtn") && !el("dxSaveBtn").disabled) el("dxSaveBtn").click();
    else toast("Ctrl+S — nothing to save on this tab");
  }
  if((e.ctrlKey||e.metaKey) && e.key==="Enter"){
    e.preventDefault();
    const active = $(".tab.is-active");
    if(!active) return;
    const tab = active.dataset.tab;
    if(tab==="triage" && el("triageCalcBtn")) el("triageCalcBtn").click();
    else if(tab==="billing" && el("billCalcBtn")) el("billCalcBtn").click();
    else if(tab==="diagnosis" && el("dxBtn")) el("dxBtn").click();
  }
});

  });
  ["labs","diagnosis","dosing","billing","repro"].forEach(tabId=>{

  const map = { labs:"labs", diagnosis:"diagnosis", treatment:"dosing",

}

function saveDraftHistory(){

    "h_time","h_exac","h_sev","h_pmhnotes","h_drugs","h_surg","h_family","h_social","h_ros"];

function loadDraftHistory(){
  if(!activePatient) return;
  const raw = localStorage.getItem(DRAFT_KEY+"_"+activePatient.id);
  if(!raw) return;
  try{
    const {vals,chips,pmh} = JSON.parse(raw);
    Object.entries(vals).forEach(([id,v])=>{ if(el(id)) el(id).value=v; });
    $$("#h_symptoms .chip").forEach(c=>{ if(chips.includes(c.dataset.s)) c.classList.add("on"); });

async function generateReferral(){
  if(!activePatient){ toast("Select a patient first", true); return; }
  if(!lastDx){ toast("Generate differentials first", true); return; }
  const btn = el("referralBtn"); btn.disabled=true;
  const p = activePatient;
  const primary = el("dx_primary")?.value.trim() || (lastDx.differentials?.[0]?.condition||"");
  const primaryICD = el("dx_primaryICD")?.value.trim() || (lastDx.differentials?.[0]?.icd10||"");
  const txItems = txSheet.map(i=>`${i.drugName} ${i.dose}`).join("; ");
  const labs = getLabResults().map(r=>`${r.name}: ${r.value||"ordered"}${r.flag?" ("+r.flag+")":""}`).join(", ");
  const prompt = `You are a clinical documentation assistant for a Kenyan clinic. Write a professional referral letter for the following patient. Use formal medical letter format. Keep it concise (under 250 words). Include: clinical summary, working diagnosis, management so far, and reason for referral.

PATIENT: ${p.age}y ${p.sex||""}, ID: ${p.code||""}${p.sha?" SHA: "+p.sha:""}
WORKING DIAGNOSIS: ${primary}${primaryICD?" ("+primaryICD+")":""}
DIFFERENTIALS: ${(lastDx.differentials||[]).slice(0,3).map(d=>d.condition).join(", ")}
LABS: ${labs||"Pending"}
TREATMENT GIVEN: ${txItems||"None yet"}
RED FLAGS NOTED: ${(lastDx.redFlags||[]).join("; ")||"None"}
GUIDELINE NOTE: ${lastDx.guidelineNote||""}
REFERRING CLINICIAN: ${CURRENT?.email||""}

Write the letter now. Start with "Dear Colleague,". End with the clinician's name/designation placeholder.`;

  const out = el("dxOut");
  out.insertAdjacentHTML("beforeend",`<div id="referralOut" class="card" style="margin-top:16px;border-color:var(--petrol)"><p class="card__label" style="color:var(--petrol-700)">Referral letter</p><div class="loading"><span class="spin"></span></div></div>`);

  try{
    const res = await fetch(CONFIG.aiEndpoint,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    const refOut = el("referralOut");
    if(refOut) refOut.innerHTML = `
      <p class="card__label" style="color:var(--petrol-700)">Referral letter</p>
      <pre class="note" style="margin-bottom:14px">${esc(text)}</pre>
      <div class="actions">
        <button class="btn btn--primary btn--sm" onclick="downloadReferral(${JSON.stringify(text).replace(/</g,'&lt;')})">Download letter</button>
        <button class="btn btn--ghost btn--sm" onclick="el('referralOut').remove()">Dismiss</button>
      </div>`;
    audit("Referral letter generated", p.id);
  }catch(e){
    const refOut = el("referralOut");
    if(refOut) refOut.innerHTML = `<p class="hint">Referral unavailable: ${esc(e.message)}</p>`;
  } finally { btn.disabled=false; }
}

/* ============================================================
   AUTO-BILLING ENGINE
   Watches clinical saves and pre-populates billing lines.
   Rules:
     - One line per billing code per session
     - Qty updates if the same code fires again
     - All lines editable/removable by clinician before filing
   ============================================================ */

function autoBillLine(code, qty){
  /* Find the SHA_PACKAGES index for this code */
  const pkgIdx = SHA_PACKAGES.findIndex(p=>p.code===code);
  if(pkgIdx===-1) return;

  const chkEl = el("blchk_"+pkgIdx);
  const qtyEl = el("blqty_"+pkgIdx);
  if(!chkEl||!qtyEl) return;

  if(chkEl.checked){
    /* Already checked — update quantity */
    const existing = parseInt(qtyEl.value)||1;
    qtyEl.value = existing + qty;
  } else {
    /* First time — tick the line and set qty */
    chkEl.checked = true;
    qtyEl.value = qty;
    el("bline_"+pkgIdx)?.classList.add("on");
  }

  /* Show billing info strip */
  const strip = el("autoBillStrip");
  if(strip) strip.style.display = "block";

  /* Update billing tab badge count */
  const billBadge = el("badge_billing");
  if(billBadge){
    const current = parseInt(billBadge.textContent)||0;
    if(!chkEl.dataset.counted){
      billBadge.textContent = current + 1;
      billBadge.style.display = "inline-flex";
      chkEl.dataset.counted = "1";
    }
  }
}

function autoBillCustomAmount(code, amount){
  /* For DRUG line which has a custom amount input */
  const pkgIdx = SHA_PACKAGES.findIndex(p=>p.code===code);
  if(pkgIdx===-1) return;
  const chkEl  = el("blchk_"+pkgIdx);
  const amtEl  = el("blamt_"+pkgIdx);
  if(!chkEl||!amtEl) return;

  if(chkEl.checked){
    /* Add to existing amount */
    const existing = parseFloat(amtEl.value)||0;
    amtEl.value = (existing + amount).toFixed(0);
  } else {
    chkEl.checked = true;
    amtEl.value = amount > 0 ? amount.toFixed(0) : "";
    el("bline_"+pkgIdx)?.classList.add("on");
  }

  const billBadge = el("badge_billing");
  if(billBadge && !chkEl.dataset.counted){
    const current = parseInt(billBadge.textContent)||0;
    billBadge.textContent = current + 1;
    billBadge.style.display = "inline-flex";
    chkEl.dataset.counted = "1";
  }
}

/* Reset auto-bill state when patient changes */
function resetAutoBill(){
  SHA_PACKAGES.forEach((_,idx)=>{
    const chk = el("blchk_"+idx);
    const qty = el("blqty_"+idx);
    const amt = el("blamt_"+idx);
    if(chk){ chk.checked=false; chk.removeAttribute("data-counted"); }
    if(qty) qty.value="1";
    if(amt) amt.value="";
    el("bline_"+idx)?.classList.remove("on");
  });
  const billBadge = el("badge_billing");
  if(billBadge){ billBadge.textContent=""; billBadge.style.display="none"; }
  lastClaim = null;
  el("billFileBtn") && (el("billFileBtn").disabled = true);
  /* Hide info strip */
  const strip = el("autoBillStrip");
  if(strip) strip.style.display = "none";
}

  const primary = ["patients","pharmacy","activity"];
  if(primary.includes(activeTabId)){
    const btn = el("bnav_"+activeTabId);
    if(btn) btn.classList.add("is-active");
  } else if(ENCOUNTER_TABS.has(activeTabId)){
    /* Encounter slot active */
    const enc = el("bnav_encounter");
    if(enc) enc.classList.add("is-active");
    lastEncounterTab = activeTabId;
  }
  /* Update more drawer item highlights */
  $$(".more-item").forEach(b=>{
    b.classList.toggle("is-active", b.dataset.tab === activeTabId);
  });
}

/* ---- More drawer ---- */
function buildMoreDrawer(){
  const grid = el("moreDrawerGrid"); if(!grid) return;
  const activeTab = (document.querySelector(".tab.is-active")||{}).dataset?.tab || "";
  grid.innerHTML = MORE_TABS.map(t=>`
    <button class="more-item${activeTab===t.id?" is-active":""}" data-tab="${t.id}"
      onclick="moreDrawerGo('${t.id}')">
      ${t.icon}
      <span>${t.label}</span>
    </button>`).join("");
}

function moreDrawerGo(tabId){
  switchTab(tabId);
  refreshBnavActive(tabId);
  closeMoreDrawer();
}

function toggleMoreDrawer(){
  const drawer  = el("moreDrawer");
  const overlay = el("moreOverlay");
  const moreBtn = el("bnav_more");
  const isOpen  = drawer.classList.contains("open");
  if(isOpen){
    closeMoreDrawer();
  } else {
    buildMoreDrawer();
    drawer.classList.add("open");
    overlay.classList.add("open");
    moreBtn && moreBtn.classList.add("is-active");
    closeFab();
  }
}

function closeMoreDrawer(){
  el("moreDrawer")?.classList.remove("open");
  el("moreOverlay")?.classList.remove("open");
  el("bnav_more")?.classList.remove("is-active");
}

/* ============================================================

let fabOpen = false;

    action:()=>{ switchTab("billing"); setTimeout(()=>{ billCalc(); setTimeout(()=>el("billFileBtn")?.click(),300); },120); }
  },
];

function buildFabActions(){
  const wrap = el("fabActions"); if(!wrap) return;
  wrap.innerHTML = FAB_ACTIONS.map(a=>{
    const isActive = a.alwaysActive || (a.activeWhen && a.activeWhen());
    return `<button class="fab-action${isActive?"":" inactive"}"
      onclick="fabDoAction('${a.id}')"
      title="${a.label}"
      ${isActive?"":"aria-disabled='true'"}>
      <span class="fab-action-label">${a.label}</span>
      <span class="fab-action-icon ${isActive?"active-icon":"inactive-icon"}">${a.icon}</span>
    </button>`;
  }).reverse().join(""); /* reverse so new patient is at bottom nearest FAB */
}

function fabDoAction(id){
  const action = FAB_ACTIONS.find(a=>a.id===id);
  const isActive = action && (action.alwaysActive || (action.activeWhen && action.activeWhen()));
  if(!isActive){ toast("Complete earlier steps first"); closeFab(); return; }
  closeFab();
  setTimeout(()=>action.action(), 80);
}

function toggleFab(){
  fabOpen = !fabOpen;
  buildFabActions();
  el("fabBtn")?.classList.toggle("open", fabOpen);
  el("fabActions")?.classList.toggle("open", fabOpen);
  el("fabOverlay")?.classList.toggle("open", fabOpen);
  if(fabOpen) closeMoreDrawer();
}

function closeFab(){
  fabOpen = false;
  el("fabBtn")?.classList.remove("open");
  el("fabActions")?.classList.remove("open");
  el("fabOverlay")?.classList.remove("open");
}

function buildPreviewBackend(){
  const daysAgo = (n)=> new Date(Date.now()-n*864e5);
  const DB = { users:[], patients:[], encounters:[], logs:[] };
  let auto = 1;

  DB.patients.push(
    { id:"pa1", code:"AFYA-K7M2P", age:29, sex:"F", weight:"62", residence:"Kahawa West", phone:"0712 880 145", nok:"Spouse", nokContact:"0712 880 100", prevAdmissions:"1", pregnant:false, sha:"SHA-441020", createdAt:daysAgo(38) },
    { id:"pa2", code:"AFYA-R4T9X", age:6,  sex:"M", weight:"19", residence:"Githurai 45", phone:"0720 114 552", nok:"Mother", nokContact:"0720 114 552", prevAdmissions:"0", pregnant:false, sha:"SHA-118809", createdAt:daysAgo(24) },
    { id:"pa3", code:"AFYA-B2N6L", age:31, sex:"F", weight:"68", residence:"Roysambu",    phone:"0733 540 901", nok:"Sister", nokContact:"0733 540 110", prevAdmissions:"2", pregnant:true,  sha:"SHA-552310", createdAt:daysAgo(12) },
    { id:"pa4", code:"AFYA-W8C3J", age:64, sex:"M", weight:"71", residence:"Zimmerman",   phone:"0701 223 768", nok:"Son",    nokContact:"0701 223 700", prevAdmissions:"3", pregnant:false, sha:"SHA-209477", createdAt:daysAgo(5) }
  );
  DB.encounters.push(
    { id:"e1", patientId:"pa3", kind:"maternity", at:daysAgo(11), by:"dr.amina@clinic.org", summary:"Routine ANC · GA 26w", payload:{weeks:26} },
    { id:"e2", patientId:"pa4", kind:"triage", at:daysAgo(4), by:"nurse.eric@clinic.org", summary:"MEWS 4 · Medium risk", payload:{score:4,band:"Medium risk"} },
    { id:"e3", patientId:"pa4", kind:"billing", at:daysAgo(4), by:"nurse.eric@clinic.org", summary:"Inpatient bed-day ×2 · KES 8,000 (co-pay KES 1,600)", payload:{total:8000,covered:6400,copay:1600} },
    { id:"e4", patientId:"pa1", kind:"history", at:daysAgo(20), by:"dr.amina@clinic.org", summary:"Note: Adult history • Presenting complaint (HPC):…", payload:{text:"Adult history"} }
  );
  DB.logs.push(
    { action:"MEWS 4 · Medium risk", by:"nurse.eric@clinic.org", at:daysAgo(4) },
    { action:"Patient registered", by:"dr.amina@clinic.org", at:daysAgo(5) },
    { action:"Routine ANC · GA 26w", by:"dr.amina@clinic.org", at:daysAgo(11) }
  );

  const val = (x)=> x instanceof Date ? x.getTime() : (x==null?-Infinity:x);
  const snap = (arr)=>({ empty:arr.length===0, size:arr.length,
    docs:arr.map(r=>{ const {id,...rest}=r; return { id, exists:true, data:()=>rest }; }),
    forEach(cb){ this.docs.forEach(cb); } });
  function query(name){
    const st={filters:[],order:null,lim:null};
    const api={
      where(f,op,v){ st.filters.push([f,op,v]); return api; },
      orderBy(f,dir="asc"){ st.order=[f,dir]; return api; },
      limit(n){ st.lim=n; return api; },
      get(){ let rows=(DB[name]||[]).slice();
        for(const [f,op,v] of st.filters) rows=rows.filter(r=> op==="=="? r[f]===v : true);
        if(st.order){ const [f,dir]=st.order; rows.sort((a,b)=>{ const x=val(a[f]),y=val(b[f]); return (x<y?-1:x>y?1:0)*(dir==="desc"?-1:1); }); }
        if(st.lim!=null) rows=rows.slice(0,st.lim);
        return Promise.resolve(snap(rows)); }
    };
    return api;
  }
  let authUser=null, authCb=null, pendingRole="doctor";
  auth = {
    onAuthStateChanged(cb){ authCb=cb; setTimeout(()=>cb(authUser),0); },
    createUserWithEmailAndPassword(email){ const sel=el("role"); pendingRole=sel?sel.value:"doctor"; authUser={uid:"me",email};
      return Promise.resolve({user:authUser}).then(r=>{ authCb&&authCb(authUser); return r; }); },
    signInWithEmailAndPassword(email){ authUser={uid:"me",email};
      return Promise.resolve({user:authUser}).then(r=>{ authCb&&authCb(authUser); return r; }); },
    signOut(){ authUser=null; authCb&&authCb(null); return Promise.resolve(); }
  };
  db = {
    collection(name){ if(!DB[name]) DB[name]=[];
      return {
        add(obj){ const id="x"+(auto++); DB[name].push({id,...obj}); return Promise.resolve({id}); },
        doc(id){ return {
          get(){ const r=DB[name].find(x=>x.id===id); return Promise.resolve(r?{id,exists:true,data:()=>{const{id,...rest}=r;return rest;}}:{exists:false,data:()=>undefined}); },
          set(obj){ const i=DB[name].findIndex(x=>x.id===id); if(i>=0)DB[name][i]={...DB[name][i],...obj}; else DB[name].push({id,...obj});
            if(name==="users"&&obj.role)pendingRole=obj.role; return Promise.resolve(); },
          update(obj){ const i=DB[name].findIndex(x=>x.id===id); if(i>=0)DB[name][i]={...DB[name][i],...obj}; return Promise.resolve(); }
        }; },
        where(f,op,v){ return query(name).where(f,op,v); },
        orderBy(f,dir){ return query(name).orderBy(f,dir); },
        limit(n){ return query(name).limit(n); },
        get(){ return query(name).get(); }
      };
    }
  };
  // make role readable for the auth-state handler (users/me)
  DB.users.push({ id:"me", get role(){ return pendingRole; } });
  Object.defineProperty(DB.users[0],"role",{ get:()=>pendingRole });
}
</script>

<script>
/* ============================================================
   SERVICE WORKER REGISTRATION + PWA INSTALL PROMPT
   ============================================================ */
(function(){

  /* Register service worker */
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js')
        .then(reg=>{
          console.log('[AfyaAI] SW registered:', reg.scope);
          /* Check for updates every 60 minutes */
          setInterval(()=> reg.update(), 60*60*1000);
          /* Notify user when new version available */
          reg.addEventListener('updatefound', ()=>{
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', ()=>{
              if(newWorker.state==='installed' && navigator.serviceWorker.controller){
                showUpdateBanner();
              }
            });
          });
        })
        .catch(err=> console.warn('[AfyaAI] SW registration failed:', err));
    });
  }

  /* Update banner */
  function showUpdateBanner(){
    const banner = document.createElement('div');
    banner.style.cssText = `
      position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:80;
      background:var(--petrol);color:#fff;padding:11px 18px;border-radius:999px;
      font-family:var(--data);font-size:13px;font-weight:600;
      box-shadow:0 4px 20px -4px rgba(11,124,116,.5);
      display:flex;align-items:center;gap:12px;white-space:nowrap;
    `;
    banner.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      New version available
      <button onclick="window.location.reload()" style="
        background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
        color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;
        font-weight:700;cursor:pointer;font-family:inherit;
      ">Update now</button>
      <button onclick="this.parentElement.remove()" style="
        background:transparent;border:0;color:rgba(255,255,255,.7);
        cursor:pointer;font-size:16px;line-height:1;padding:0 2px;
      ">✕</button>
    `;
    document.body.appendChild(banner);
    setTimeout(()=>{ if(banner.parentNode) banner.remove(); }, 12000);
  }

  /* PWA Install prompt — capture and show custom button */
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallButton();
  });

  function showInstallButton(){
    /* Only show if not already installed */
    if(window.matchMedia('(display-mode: standalone)').matches) return;
    const btn = document.createElement('button');
    btn.id = 'pwaInstallBtn';
    btn.style.cssText = `
      position:fixed;bottom:72px;left:16px;z-index:79;
      background:var(--surface);border:1px solid var(--petrol);
      color:var(--petrol-700);padding:9px 14px;border-radius:999px;
      font-family:var(--data);font-size:12px;font-weight:700;
      box-shadow:0 2px 12px -4px rgba(11,124,116,.3);
      display:flex;align-items:center;gap:7px;cursor:pointer;
      transition:background .15s;
    `;
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2v13M8 11l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Install AfyaAI
    `;
    btn.onclick = async ()=>{
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if(outcome==='accepted'){
        btn.remove();
        deferredInstallPrompt = null;
      }
    };
    document.body.appendChild(btn);
    /* Auto-hide after 30 seconds */
    setTimeout(()=>{ if(btn.parentNode) btn.remove(); }, 30000);
  }

  window.addEventListener('appinstalled', ()=>{
    document.getElementById('pwaInstallBtn')?.remove();
    deferredInstallPrompt = null;
    console.log('[AfyaAI] PWA installed successfully');
  });

})();
</script>
