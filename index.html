<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AfyaAI Kenya — Clinical Console</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B7C74">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AfyaAI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="AfyaAI Kenya">
<meta name="description" content="Clinical Console — MOH/IMCI/WHO aligned. SHA billing, Afya AI differentials, mobile-first.">

<!-- PWA icons (inline SVG favicon) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230B7C74'/><path d='M16 8v16M8 16h16' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

<!-- Firebase (compat builds expose the global `firebase` API this app uses) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  :root{
    --ink:#142220; --ink-soft:#516460; --ink-faint:#7E908C;
    --petrol:#0B7C74; --petrol-700:#075F59; --petrol-050:#E7F2F0;
    --mist:#EEF3F2; --surface:#FFFFFF;
    --line:#D9E3E1; --line-strong:#C4D2CF;
    --alert:#AE3A3F; --alert-050:#F7E9E9;
    --amber:#9C6B1E; --amber-050:#F6EEDD;
    --r:12px; --r-sm:8px;
    --shadow:0 1px 2px rgba(20,34,32,.04), 0 8px 24px -16px rgba(20,34,32,.18);
    --sans:"Instrument Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --serif:"Instrument Serif", Georgia, "Times New Roman", serif;
    --data:"Instrument Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:var(--sans);color:var(--ink);background:var(--mist);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:var(--petrol);}
  .data,.tnum{font-family:var(--data);font-variant-numeric:tabular-nums;}
  .eyebrow{font-family:var(--data);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);}
  .hint{color:var(--ink-faint);font-size:13px;}

  /* ---------- LOGIN ---------- */
  .login{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;}
  .login__aside{background:var(--petrol);color:#EAF4F2;padding:56px 56px 44px;display:flex;flex-direction:column;justify-content:space-between;
    background-image:radial-gradient(120% 90% at 100% 0%, rgba(255,255,255,.08), transparent 55%),linear-gradient(180deg, var(--petrol), var(--petrol-700));}
  .login__brand{display:flex;align-items:center;gap:12px;}
  .mark{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center;}
  .mark svg{width:30px;height:30px;display:block;}
  .login__brand .name{font-family:var(--serif);font-size:20px;color:#fff;}
  .login__center{max-width:32ch;}
  .login__hook{font-family:var(--serif);font-weight:400;font-size:47px;line-height:1.08;margin:0 0 18px;color:#fff;letter-spacing:0;}
  .login__sub{color:rgba(234,244,242,.82);font-size:16px;margin:0;}
  .login__facts{display:flex;flex-wrap:wrap;gap:6px 26px;border-top:1px solid rgba(255,255,255,.18);padding-top:20px;}
  .login__facts div{font-family:var(--data);font-size:11px;letter-spacing:.12em;color:rgba(234,244,242,.7);}
  .login__facts b{display:block;color:#fff;font-weight:500;letter-spacing:.04em;font-size:12px;margin-top:2px;}
  .login__main{display:grid;place-items:center;padding:40px 28px;}
  .authcard{width:100%;max-width:380px;}
  .authcard h2{font-family:var(--serif);font-weight:400;font-size:26px;margin:0 0 4px;}
  .authcard .lede{color:var(--ink-soft);margin:0 0 26px;font-size:14px;}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--mist);border:1px solid var(--line);border-radius:var(--r-sm);padding:4px;margin-bottom:22px;}
  .seg button{border:0;background:transparent;border-radius:5px;padding:9px 0;font-size:13.5px;font-weight:500;color:var(--ink-soft);transition:background .15s,color .15s;}
  .seg button.is-active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}

  /* ---------- SHELL ---------- */
  .shell{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;}
  .topbar__brand{display:flex;align-items:center;gap:11px;}
  .topbar__brand .name{font-family:var(--serif);font-size:18px;}
  .topbar__brand .sub{font-family:var(--data);font-size:10.5px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;}
  .topbar__user{display:flex;align-items:center;gap:14px;}
  .who{text-align:right;line-height:1.25;}
  .who .em{font-family:var(--data);font-size:12.5px;color:var(--ink-soft);}
  .pill{display:inline-block;font-family:var(--data);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--petrol-050);color:var(--petrol-700);font-weight:600;}
  .icon-btn{border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);width:38px;height:38px;display:grid;place-items:center;color:var(--ink-soft);transition:border-color .15s,color .15s;}
  .icon-btn:hover{border-color:var(--line-strong);color:var(--ink);}
  .icon-btn svg{width:17px;height:17px;}

  .tabs{position:sticky;top:60px;z-index:25;background:var(--surface);border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 16px;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{border:0;background:transparent;padding:14px 14px 12px;white-space:nowrap;font-size:14px;font-weight:500;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;}
  .tab .idx{font-family:var(--data);font-size:11px;color:var(--ink-faint);margin-right:7px;}
  .tab:hover{color:var(--ink);}
  .tab.is-active{color:var(--ink);border-bottom-color:var(--petrol);}
  .tab.is-active .idx{color:var(--petrol);}

  /* ---------- PATIENT CONTEXT STRIP ---------- */
  /* ctx styles moved to new pipeline CSS block */
  
  
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--petrol-050);color:var(--petrol-700);display:grid;place-items:center;font-size:12px;font-weight:600;letter-spacing:.02em;}
  
  
  
  
  

  /* ---------- MAIN / PANELS ---------- */
  .main{flex:1;max-width:1040px;width:100%;margin:0 auto;padding:30px 24px 64px;}
  .panel{display:none;animation:rise .26s ease both;}
  .panel.is-active{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .panel__head{margin-bottom:20px;}
  .panel__title{font-family:var(--serif);font-weight:400;font-size:30px;margin:6px 0 4px;letter-spacing:0;}
  .panel__hint{color:var(--ink-soft);font-size:14px;margin:0;max-width:64ch;}

  .grid{display:grid;grid-template-columns:1fr 330px;gap:22px;align-items:start;}
  .grid--solo{grid-template-columns:1fr;max-width:720px;}
  .grid--patients{grid-template-columns:340px 1fr;gap:22px;align-items:start;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);}
  .card__label{font-family:var(--data);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}

  .field{margin-bottom:15px;}
  .field:last-child{margin-bottom:0;}
  .field > label{display:block;font-size:12.5px;font-weight:500;color:var(--ink-soft);margin-bottom:6px;}
  .field > label .u{color:var(--ink-faint);font-weight:400;}
  .control{width:100%;padding:11px 12px;border:1px solid var(--line-strong);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);font-size:14.5px;transition:border-color .15s,box-shadow .15s;}
  textarea.control{min-height:150px;resize:vertical;line-height:1.55;}
  .control--data{font-family:var(--data);font-variant-numeric:tabular-nums;}
  .control:focus{outline:none;border-color:var(--petrol);box-shadow:0 0 0 3px var(--petrol-050);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

  .actions{margin-top:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .btn{border:1px solid transparent;border-radius:var(--r-sm);padding:11px 18px;font-size:14px;font-weight:600;letter-spacing:.01em;transition:background .15s,transform .05s,border-color .15s;}
  .btn--primary{background:var(--petrol);color:#fff;}
  .btn--primary:hover{background:var(--petrol-700);}
  .btn--ghost{background:var(--surface);border-color:var(--line-strong);color:var(--ink);}
  .btn--ghost:hover{border-color:var(--ink-soft);}
  .btn--sm{padding:8px 13px;font-size:13px;}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45;cursor:default;transform:none;}
  .btn--full{width:100%;display:flex;justify-content:center;}

  /* ---------- READOUT ---------- */
  .readout{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
  .readout__spine{height:4px;background:var(--line-strong);}
  .readout__body{padding:20px;}
  .readout__label{font-family:var(--data);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px;}
  .readout__value{font-family:var(--serif);font-size:34px;font-weight:400;line-height:1.08;margin:0;}
  .readout__meta{font-family:var(--data);font-size:12px;color:var(--ink-soft);margin:10px 0 0;}
  .readout__rows{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:grid;gap:9px;}
  .rrow{display:flex;align-items:baseline;justify-content:space-between;gap:14px;}
  .rrow .k{font-size:13px;color:var(--ink-soft);}
  .rrow .v{font-family:var(--data);font-size:13.5px;font-variant-numeric:tabular-nums;}
  .readout__note{font-size:12px;color:var(--ink-faint);margin:14px 0 0;line-height:1.5;border-top:1px dashed var(--line-strong);padding-top:12px;}
  .readout.is-high .readout__spine,.readout.is-refer .readout__spine{background:var(--alert);}
  .readout.is-high .readout__value,.readout.is-refer .readout__value{color:var(--alert);}
  .readout.is-med .readout__spine{background:var(--amber);}
  .readout.is-med .readout__value{color:var(--amber);}
  .readout.is-low .readout__spine,.readout.is-routine .readout__spine,.readout.is-ok .readout__spine{background:var(--petrol);}
  .readout.is-low .readout__value,.readout.is-routine .readout__value,.readout.is-ok .readout__value{color:var(--petrol);}
  .readout__empty{color:var(--ink-faint);font-size:13.5px;}

  /* ---------- PATIENTS ---------- */
  .search{position:relative;margin-bottom:12px;}
  .search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-size:14px;background:var(--surface);}
  .search input:focus{outline:none;border-color:var(--petrol);box-shadow:0 0 0 3px var(--petrol-050);}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-faint);}
  .plist{display:flex;flex-direction:column;gap:8px;max-height:62vh;overflow-y:auto;padding-right:2px;}
  .pitem{text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:12px 13px;display:flex;align-items:center;gap:11px;transition:border-color .12s,background .12s;}
  .pitem:hover{border-color:var(--line-strong);}
  .pitem.is-active{border-color:var(--petrol);background:var(--petrol-050);}
  .pitem .nm{font-weight:600;font-size:14px;line-height:1.2;}
  .pitem .mt{font-family:var(--data);font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .pitem .sha{margin-left:auto;font-family:var(--data);font-size:11px;color:var(--ink-faint);white-space:nowrap;}
  .plist__empty{padding:26px 8px;text-align:center;color:var(--ink-faint);font-size:13.5px;}

  .detail__head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
  .detail__name{font-family:var(--serif);font-size:28px;line-height:1.05;margin:0;}
  .kv{display:flex;flex-wrap:wrap;gap:6px 26px;margin-top:10px;}
  .kv div{font-size:13px;color:var(--ink-soft);}
  .kv b{font-family:var(--data);color:var(--ink);font-weight:500;}
  .ledger{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 20px;}
  .lcell{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--surface);}
  .lcell .l{font-family:var(--data);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
  .lcell .v{font-family:var(--serif);font-size:21px;margin-top:3px;}

  .tl-h{font-family:var(--data);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px;}
  .timeline{display:flex;flex-direction:column;}
  .tl-item{display:flex;gap:13px;padding:13px 0;border-top:1px solid var(--line);}
  .tl-item:first-child{border-top:0;}
  .tl-dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:0 0 auto;background:var(--petrol);}
  .tl-dot.k-triage{background:var(--amber);}
  .tl-dot.k-billing{background:var(--petrol-700);}
  .tl-dot.k-repro{background:var(--alert);}
  .tl-dot.k-history{background:var(--ink-faint);}
  .tl-body{flex:1;min-width:0;}
  .tl-kind{font-family:var(--data);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);}
  .tl-sum{font-size:14px;margin:1px 0 0;}
  .tl-meta{font-family:var(--data);font-size:11.5px;color:var(--ink-faint);margin-top:3px;}
  .tl-empty{color:var(--ink-faint);font-size:13.5px;padding:18px 0;border-top:1px dashed var(--line-strong);}

  /* ---------- GATE / EMPTY ---------- */
  .gate{border:1px dashed var(--line-strong);border-radius:var(--r);background:var(--surface);padding:40px 24px;text-align:center;}
  .gate svg{width:26px;height:26px;color:var(--ink-faint);margin-bottom:8px;}
  .gate p{margin:0;color:var(--ink-soft);font-size:14px;}
  .gate .btn{margin-top:16px;}
  [hidden]{display:none !important;}

  /* ---------- CHECKLIST ---------- */
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .check{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:13.5px;cursor:pointer;transition:border-color .12s,background .12s;}
  .check:hover{border-color:var(--line-strong);}
  .check input{margin:2px 0 0;accent-color:var(--petrol);width:15px;height:15px;flex:0 0 auto;}
  .check.on{border-color:var(--alert);background:var(--alert-050);}

  /* ---------- ACTIVITY ---------- */
  .activity{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:var(--shadow);}
  .act{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:13px 18px;border-bottom:1px solid var(--line);}
  .act:last-child{border-bottom:0;}
  .act .what{font-size:14px;}
  .act .who{font-family:var(--data);font-size:11.5px;color:var(--ink-faint);}
  .act .when{font-family:var(--data);font-size:11.5px;color:var(--ink-faint);white-space:nowrap;}
  .activity__empty{padding:34px 18px;text-align:center;color:var(--ink-faint);font-size:13.5px;background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--r);}

  /* ---------- MISC ---------- */
  .banner{background:var(--amber-050);border-bottom:1px solid #E9DCC0;color:#6B4E16;font-size:12.5px;padding:8px 24px;display:flex;align-items:center;gap:8px;}
  .banner b{font-weight:600;}
  .msg{min-height:18px;font-size:13px;margin:14px 0 0;color:var(--alert);}
  .footnote{margin:30px auto 0;max-width:1040px;padding:0 24px;color:var(--ink-faint);font-size:11.5px;line-height:1.5;}
  .footnote b{color:var(--ink-soft);font-weight:500;}
  .spin{display:inline-block;width:30px;height:30px;border:2px solid var(--line);border-top-color:var(--petrol);border-radius:50%;animation:spin .7s linear infinite;}
  .loading{display:grid;place-items:center;padding:40px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;box-shadow:0 10px 30px -10px rgba(20,34,32,.5);animation:toast .25s ease both;}
  .toast .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--petrol);margin-right:9px;vertical-align:middle;}
  .toast.err .dot{background:#FF6B6B;}
  @keyframes toast{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  :focus-visible{outline:2px solid var(--petrol);outline-offset:2px;border-radius:4px;}

  /* ---------- HISTORY / CLERKING ---------- */
  .stack{display:flex;flex-direction:column;gap:16px;}
  .tagmode{font-family:var(--data);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--petrol-050);color:var(--petrol-700);padding:2px 8px;border-radius:999px;margin-left:8px;font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:7px 12px;font-size:13px;color:var(--ink-soft);transition:background .12s,border-color .12s,color .12s;}
  .chip:hover{border-color:var(--ink-soft);}
  .chip.on{background:var(--petrol-050);border-color:var(--petrol);color:var(--petrol-700);font-weight:600;}
  .dur{display:grid;grid-template-columns:1fr 132px;gap:10px;}
  pre.note{white-space:pre-wrap;font-family:var(--data);font-size:12.5px;line-height:1.6;background:var(--mist);border:1px solid var(--line);border-radius:10px;padding:14px;margin:0;color:var(--ink);}

  /* ---------- AFYA AI DIFFERENTIALS ---------- */
  .dx{display:flex;flex-direction:column;gap:16px;}
  .dx-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .dx-cond{display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:600;font-size:14.5px;}
  .dx-rat{font-size:13px;color:var(--ink-soft);margin-top:5px;}
  .dx-list{margin:6px 0 0;padding-left:18px;font-size:13.5px;line-height:1.6;}
  .lk{font-family:var(--data);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-weight:600;white-space:nowrap;}
  .lk.high{background:var(--alert-050);color:var(--alert);}
  .lk.moderate{background:var(--amber-050);color:var(--amber);}
  .lk.low{background:var(--petrol-050);color:var(--petrol-700);}
  .redflags{background:var(--alert-050);border:1px solid #E6C9CB;border-radius:10px;padding:12px 14px;}
  .redflags .l{color:var(--alert);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;}
  .dx-disc{font-size:11.5px;color:var(--ink-faint);border-top:1px dashed var(--line-strong);padding-top:10px;line-height:1.5;}

  /* ---------- LABS ---------- */
  .labgrid{display:flex;flex-direction:column;margin:10px 0 4px;}
  .labrow{display:grid;grid-template-columns:1fr 116px 96px 56px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);}
  .labpick{display:flex;align-items:center;gap:9px;cursor:pointer;min-width:0;}
  .labpick input{accent-color:var(--petrol);width:15px;height:15px;flex:0 0 auto;}
  .labname{font-size:13.5px;}
  .labrow .lab_val{padding:7px 9px;font-size:13px;}
  .labref{font-family:var(--data);font-size:11.5px;color:var(--ink-faint);text-align:right;}
  .labflag{font-family:var(--data);font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;text-align:right;}
  .labflag.bad{color:var(--alert);}
  .labflag.ok{color:var(--petrol-700);}
  .labrow.suggested{background:var(--petrol-050);border-radius:6px;}
  .suggestbox{background:var(--mist);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;margin-bottom:12px;}

  /* ---------- TREATMENT — class/drug cascade ---------- */
  .tx-class-banner{background:var(--petrol-050);border:1px solid var(--petrol);border-radius:var(--r-sm);padding:8px 12px;font-family:var(--data);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--petrol-700);font-weight:600;margin-bottom:12px;display:none;}
  .tx-class-banner.show{display:block;}
  .custom-toggle{display:flex;align-items:center;gap:9px;border:1px dashed var(--line-strong);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:14px;cursor:pointer;font-size:13.5px;color:var(--ink-soft);transition:border-color .15s;}
  .custom-toggle:hover{border-color:var(--petrol);}
  .custom-toggle input[type=checkbox]{accent-color:var(--petrol);width:15px;height:15px;flex-shrink:0;}
  .custom-toggle.on{border-color:var(--amber);background:var(--amber-050);color:var(--ink);}
  .custom-hint{font-size:12px;color:var(--ink-faint);line-height:1.5;padding:8px 11px;background:var(--mist);border-radius:6px;border-left:3px solid var(--amber);margin-bottom:12px;}
  .dose-chip{display:inline-block;background:var(--petrol-050);color:var(--petrol-700);border:1px solid var(--petrol);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--data);margin-top:5px;}
  .badge-nis{display:inline-block;background:var(--amber-050);color:var(--amber);border:1px solid #E9DCC0;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.08em;padding:2px 7px;white-space:nowrap;vertical-align:middle;}
  .badge-oos{display:inline-block;background:var(--alert-050);color:var(--alert);border:1px solid #E6C9CB;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.08em;padding:2px 7px;white-space:nowrap;vertical-align:middle;}
  .alert-box{border-radius:var(--r-sm);padding:9px 12px;font-size:13px;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start;line-height:1.5;}
  .alert-box svg{flex-shrink:0;margin-top:1px;}
  .alert-box--warn{background:var(--amber-050);border:1px solid #E9DCC0;color:#6B4E16;}
  .alert-box--alert{background:var(--alert-050);border:1px solid #E6C9CB;color:var(--alert);}
  .alert-box--info{background:var(--petrol-050);border:1px solid var(--petrol);color:var(--petrol-700);}
  /* treatment sheet table */
  .tx-table{width:100%;border-collapse:collapse;font-size:13px;}
  .tx-table th{text-align:left;padding:9px 10px;background:var(--mist);font-family:var(--data);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);border-bottom:1px solid var(--line);}
  .tx-table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  .tx-table tr:last-child td{border-bottom:0;}
  .tx-table .dn{font-weight:600;font-size:13.5px;line-height:1.3;}
  .tx-table .df{color:var(--ink-faint);font-size:12px;margin-top:1px;}
  .tx-table .dd{font-family:var(--data);font-size:12.5px;}
  .tx-table .dp{font-family:var(--data);font-size:12px;color:var(--petrol-700);background:var(--petrol-050);border-radius:4px;padding:2px 6px;display:inline-block;margin-top:3px;}
  .tx-table .dnotes{color:var(--ink-faint);font-size:12px;margin-top:2px;}
  .tx-rm{background:transparent;border:0;color:var(--ink-faint);cursor:pointer;padding:0 4px;font-size:16px;line-height:1;}
  .tx-rm:hover{color:var(--alert);}
  .tx-empty{padding:28px 0;text-align:center;color:var(--ink-faint);font-size:13.5px;border:1px dashed var(--line-strong);border-radius:var(--r-sm);}
  /* ---------- PHARMACY ---------- */
  .pharm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .pharm-item{border:1px solid var(--line);border-radius:10px;padding:12px 13px;background:var(--surface);}
  .pharm-item__name{font-weight:600;font-size:13px;margin:0 0 2px;line-height:1.3;}
  .pharm-item__form{font-size:11.5px;color:var(--ink-faint);margin-bottom:5px;}
  .pharm-item__stock{font-family:var(--data);font-size:13px;}
  .pharm-item__stock.ok{color:var(--petrol-700);}
  .pharm-item__stock.low{color:var(--amber);font-weight:600;}
  .stock-bar{height:3px;border-radius:99px;background:var(--line);margin-top:6px;overflow:hidden;}
  .stock-bar__fill{height:100%;border-radius:99px;background:var(--petrol);}
  .stock-bar__fill.low{background:var(--amber);}

  @media (max-width:880px){
    .login{grid-template-columns:1fr;}
    .login__aside{padding:38px 28px;}
    .login__hook{font-size:36px;}
    .grid,.grid--patients{grid-template-columns:1fr;}
    .checks{grid-template-columns:1fr;}
    .ledger{grid-template-columns:1fr;}
    .labrow{grid-template-columns:1fr 72px 50px;}
    .labref{display:none;}
  }

  /* ---------- BILLING (multi-item, payment method) ---------- */
  .bill-cats{display:flex;flex-direction:column;gap:2px;margin-bottom:14px;}
  .bill-cat-head{font-family:var(--data);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);padding:6px 0 3px;margin-top:8px;}
  .bill-cat-head:first-child{margin-top:0;}
  .bill-line{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:var(--surface);transition:border-color .12s,background .12s;}
  .bill-line:hover{border-color:var(--line-strong);}
  .bill-line.on{border-color:var(--petrol);background:var(--petrol-050);}
  .bill-line input[type=checkbox]{accent-color:var(--petrol);width:15px;height:15px;flex:0 0 auto;}
  .bill-line .bl-label{font-size:13.5px;}
  .bill-line .bl-tariff{font-family:var(--data);font-size:12.5px;color:var(--ink-soft);white-space:nowrap;}
  .bill-line .bl-qty{width:54px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:var(--data);text-align:center;background:var(--surface);}
  .bill-line .bl-qty:focus{outline:none;border-color:var(--petrol);}
  .bill-line .bl-amt{width:90px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:var(--data);text-align:right;background:var(--surface);}
  .bill-line .bl-amt:focus{outline:none;border-color:var(--petrol);}
  /* payment method pills */
  .pay-methods{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .pay-pill{border:1px solid var(--line-strong);background:var(--surface);border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;}
  .pay-pill:hover{border-color:var(--petrol);}
  .pay-pill.on{border-color:var(--petrol);background:var(--petrol-050);color:var(--petrol-700);}
  .pay-pill.on.cash{border-color:var(--amber);background:var(--amber-050);color:var(--amber);}
  .pay-pill.on.mpesa{border-color:#2D7D46;background:#EBF5EF;color:#2D7D46;}
  .pay-pill svg{width:14px;height:14px;}
  /* receipt summary */
  .receipt-lines{display:flex;flex-direction:column;gap:0;margin:12px 0 0;}
  .receipt-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .receipt-row:last-child{border-bottom:0;}
  .receipt-row .rk{color:var(--ink-soft);}
  .receipt-row .rv{font-family:var(--data);font-variant-numeric:tabular-nums;}
  .receipt-total{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:12px 0 4px;margin-top:4px;border-top:2px solid var(--ink);font-size:15px;font-weight:600;}
  .receipt-total .rv{font-family:var(--data);font-size:17px;}
  .receipt-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--data);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-weight:600;margin-left:6px;}
  .receipt-badge.sha{background:var(--petrol-050);color:var(--petrol-700);}
  .receipt-badge.cash{background:var(--amber-050);color:var(--amber);}
  .receipt-badge.mpesa{background:#EBF5EF;color:#2D7D46;}
  .mpesa-ref{margin-top:10px;}
  .mpesa-ref input{padding:8px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-size:13.5px;width:100%;}
  .mpesa-ref input:focus{outline:none;border-color:var(--petrol);}

  /* ---------- PATIENT FILE (consolidated live record) ---------- */
  .pfile{display:flex;flex-direction:column;gap:0;}
  .pfile-section{padding:16px 0;border-top:1px solid var(--line);}
  .pfile-section:first-child{border-top:0;padding-top:4px;}
  .pfile-sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .pfile-sec-icon{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;}
  .pfile-sec-icon.triage{background:var(--amber-050);color:var(--amber);}
  .pfile-sec-icon.history{background:var(--mist);color:var(--ink-soft);}
  .pfile-sec-icon.labs{background:#EEE8F5;color:#6B4E9E;}
  .pfile-sec-icon.diagnosis{background:var(--petrol-050);color:var(--petrol-700);}
  .pfile-sec-icon.treatment{background:#E8F5E9;color:#2E7D32;}
  .pfile-sec-icon.billing{background:#E3F0FF;color:#1565C0;}
  .pfile-sec-icon.repro{background:var(--alert-050);color:var(--alert);}
  .pfile-sec-title{font-family:var(--data);font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);}
  .pfile-sec-time{margin-left:auto;font-family:var(--data);font-size:11px;color:var(--ink-faint);}
  .pfile-kv{display:flex;flex-wrap:wrap;gap:4px 20px;font-size:13px;}
  .pfile-kv span{color:var(--ink-soft);}
  .pfile-kv b{font-family:var(--data);color:var(--ink);font-weight:500;}
  .pfile-note{font-family:var(--data);font-size:12.5px;line-height:1.6;background:var(--mist);border:1px solid var(--line);border-radius:8px;padding:10px 12px;white-space:pre-wrap;color:var(--ink);}
  .pfile-empty{color:var(--ink-faint);font-size:13px;font-style:italic;}
  .pfile-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}

  /* ---------- DIAGNOSIS — clinician working diagnosis ---------- */
  .dx-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;transition:border-color .12s;}
  .dx-item:hover{border-color:var(--line-strong);}
  .dx-set-btn{border:1px solid var(--line);background:var(--surface);border-radius:6px;padding:4px 10px;font-size:11.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;}
  .dx-set-btn:hover{border-color:var(--petrol);color:var(--petrol-700);background:var(--petrol-050);}
  .dx-working{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-top:0;}
  .dx-working-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end;margin-bottom:12px;}
  .dx-working-row:last-of-type{margin-bottom:0;}
  .dx-icd-btn{padding:10px 13px;border:1px solid var(--line-strong);border-radius:var(--r-sm);background:var(--surface);font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .dx-icd-btn:hover{border-color:var(--petrol);color:var(--petrol-700);}
  .dx-icd-result{display:inline-block;font-family:var(--data);font-size:12px;background:var(--petrol-050);color:var(--petrol-700);border:1px solid var(--petrol);border-radius:5px;padding:3px 8px;margin-top:5px;}
  .dx-working-label{font-size:11px;font-family:var(--data);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:6px;}
  .dx-row-wrap{display:flex;flex-direction:column;}

  /* working diagnosis banner on treatment tab */
  .tx-dx-banner{background:var(--petrol-050);border:1px solid var(--petrol);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;display:none;}
  .tx-dx-banner.show{display:flex;align-items:center;gap:10px;}
  .tx-dx-banner svg{flex-shrink:0;color:var(--petrol-700);}
  .tx-dx-banner .tx-dx-text{flex:1;font-size:13px;color:var(--petrol-700);}
  .tx-dx-banner .tx-dx-text strong{font-weight:600;}


  /* ---- DARK MODE ---- */
  body.dark{
    --ink:#E8F0EE; --ink-soft:#9BB5B0; --ink-faint:#6A8C87;
    --petrol:#0FA198; --petrol-700:#0D8A82; --petrol-050:#0D2E2C;
    --mist:#0E1A19; --surface:#162221; --line:#1E3330; --line-strong:#254744;
    --alert:#E05A5F; --alert-050:#2A1213;
    --amber:#C8882A; --amber-050:#261B0A;
  }
  .dark .topbar,.dark .tabs,.dark .ctx{background:var(--surface);border-color:var(--line);}
  .dark .card,.dark .readout,.dark .activity{background:var(--surface);border-color:var(--line);}
  .dark .control{background:var(--surface);border-color:var(--line-strong);color:var(--ink);}
  .dark .btn--ghost{background:var(--surface);border-color:var(--line-strong);color:var(--ink);}
  .dark .seg,.dark .repro-seg{background:var(--mist);}
  .dark .seg button.is-active,.dark .repro-seg button.is-active{background:var(--surface);}
  .dark .pitem,.dark .check,.dark .chip{background:var(--surface);border-color:var(--line);}
  .dark .pitem.is-active{background:var(--petrol-050);}
  .dark .chip.on{background:var(--petrol-050);}
  .dark .lcell,.dark .pharm-item{background:var(--surface);border-color:var(--line);}
  .dark .pay-pill{background:var(--surface);border-color:var(--line-strong);}
  .dark .dx-item{background:var(--surface);border-color:var(--line);}
  .dark .tx-dx-banner{background:var(--petrol-050);}
  .dark .lab-suggest,.dark .tx-dose-calc{background:var(--petrol-050);}
  .dark pre.note,.dark .pfile-note{background:var(--mist);border-color:var(--line);}
  .dark .banner{background:#1A2800;border-color:#3A5000;color:#BADA77;}
  .dark .repro-seg button.is-active{background:var(--surface);color:var(--ink);}

  /* ---- TAB BADGE ---- */
  .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;border-radius:999px;background:var(--petrol);color:#fff;font-family:var(--data);font-size:10px;font-weight:700;padding:0 4px;margin-left:6px;vertical-align:middle;line-height:1;}

  /* ---- REPRO HEALTH (4 sub-tabs) ---- */
  .repro-seg{display:flex;gap:3px;background:var(--mist);border:1px solid var(--line);border-radius:var(--r-sm);padding:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
  .repro-seg::-webkit-scrollbar{display:none;}
  .repro-seg button{border:0;background:transparent;border-radius:5px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--ink-soft);white-space:nowrap;transition:background .15s,color .15s;}
  .repro-seg button.is-active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}
  .repro-panel{display:none;}
  .repro-panel.is-active{display:block;animation:rise .22s ease both;}

  /* ANC visit card */
  .anc-visit-card{background:var(--petrol-050);border:1px solid var(--petrol);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;}
  .anc-visit-card .av-head{font-family:var(--data);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--petrol-700);font-weight:700;margin-bottom:6px;}
  .anc-ipt{display:flex;gap:8px;flex-wrap:wrap;}
  .anc-ipt label{display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;}
  .anc-ipt input{accent-color:var(--petrol);}

  /* Partograph row */
  .parto-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  @media(max-width:600px){.parto-grid{grid-template-columns:1fr 1fr;}}

  /* Prescription print slip */
  .rx-header{border-bottom:2px solid var(--petrol);padding-bottom:10px;margin-bottom:14px;}
  .rx-drug-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .rx-drug-row:last-child{border-bottom:0;}
  .rx-drug-name{font-weight:600;}
  .rx-drug-dose{font-family:var(--data);font-size:12.5px;color:var(--ink-soft);}

  /* Referral letter button */
  .referral-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;}

  /* Draft indicator */
  .draft-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amber);margin-left:6px;vertical-align:middle;animation:pulse 1.5s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* Lab indicator on diagnosis */
  .lab-indicator{display:flex;align-items:center;gap:8px;background:var(--petrol-050);border:1px solid var(--petrol);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:14px;font-size:13px;color:var(--petrol-700);}
  .lab-indicator svg{flex-shrink:0;}

  /* ---- ENCOUNTER PROGRESS PIPELINE ---- */
  .ctx{position:sticky;top:108px;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:stretch;gap:0;min-height:56px;flex-wrap:wrap;}
  .ctx__left{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 0;border-right:1px solid var(--line);min-width:0;flex-shrink:0;}
  .ctx__right{display:flex;align-items:center;gap:4px;padding:8px 0 8px 16px;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0;}
  .ctx__right::-webkit-scrollbar{display:none;}
  .ctx__none{color:var(--ink-faint);font-size:13px;padding:16px 0;display:flex;align-items:center;gap:8px;}
  .ctx__none svg{flex-shrink:0;}

  /* Patient chip inside ctx__left */
  .ctx__chip{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .ctx__chip .nm{font-weight:700;font-size:13.5px;font-family:var(--data);letter-spacing:.02em;line-height:1.2;}
  .ctx__chip .mt{font-size:12px;color:var(--ink-soft);}
  .ctx__meta{display:flex;flex-direction:column;gap:1px;}
  .ctx__badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
  .ctx__badge{font-family:var(--data);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:999px;white-space:nowrap;}
  .ctx__badge--allergy{background:var(--alert-050);color:var(--alert);border:1px solid #E6C9CB;}
  .ctx__badge--pregnant{background:var(--petrol-050);color:var(--petrol-700);border:1px solid var(--petrol);}
  .ctx__clear{border:0;background:transparent;color:var(--ink-faint);width:24px;height:24px;border-radius:50%;display:grid;place-items:center;cursor:pointer;flex-shrink:0;transition:background .12s,color .12s;}
  .ctx__clear:hover{background:var(--mist);color:var(--ink);}

  /* Progress pipeline pills */
  .prog-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:all .15s;flex-shrink:0;}
  .prog-pill svg{width:13px;height:13px;flex-shrink:0;}
  .prog-pill--empty{color:var(--ink-faint);border-color:var(--line);}
  .prog-pill--empty:hover{border-color:var(--line-strong);color:var(--ink-soft);}
  .prog-pill--done{color:var(--petrol-700);background:var(--petrol-050);border-color:var(--petrol);}
  .prog-pill--active{color:#fff;background:var(--petrol);border-color:var(--petrol-700);box-shadow:0 2px 8px -2px rgba(11,124,116,.4);}
  .prog-pill--active svg{color:#fff;}
  .prog-sep{color:var(--line-strong);font-size:14px;flex-shrink:0;padding:0 2px;user-select:none;}

  /* Pulse dot for active stage */
  .prog-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .prog-dot.pulse{animation:progpulse 1.4s ease infinite;}
  @keyframes progpulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* Patient list item dots */
  .pitem-dots{display:flex;gap:3px;margin-left:auto;align-items:center;}
  .pitem-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .pitem-dot--allergy{background:var(--alert);}
  .pitem-dot--pregnant{background:var(--petrol);}

  /* Patient detail card — allergy + pregnant badges */
  .detail__badges{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px;}
  .detail__badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--data);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;}
  .detail__badge--allergy{background:var(--alert-050);color:var(--alert);border:1px solid #E6C9CB;}
  .detail__badge--allergy svg{width:11px;height:11px;}

const firebaseConfig = {

};

let DEMO = false, auth, db;
let CURRENT = { email:"", role:"doctor" };
let activePatient = null;
let patientsCache = [];

let lastDose = null;

(function boot(){

/* ---------------- helpers ---------------- */
const el = (id)=>document.getElementById(id);
const $  = (sel,root=document)=>root.querySelector(sel);
const $$ = (sel,root=document)=>Array.from(root.querySelectorAll(sel));

const money = (n)=>"KES " + Number(n||0).toLocaleString("en-KE");
const num = (v)=>{ const n=Number(v); return Number.isFinite(n)?n:null; };
const AVATAR = '<span class="avatar"><svg viewBox="0 0 24 24" width="15" height="15" fill="none"><circle cx="12" cy="8.2" r="3.2" stroke="currentColor" stroke-width="1.7"/><path d="M5.5 19.5c0-3.1 2.9-5.2 6.5-5.2s6.5 2.1 6.5 5.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>';
function toDate(v){ if(!v) return null; if(typeof v.toDate==="function") return v.toDate(); if(v instanceof Date) return v; const d=new Date(v); return isNaN(d)?null:d; }
function fmtTime(v){ const d=toDate(v); if(!d) return "—"; return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+", "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",hour12:false}); }
function makeCode(){ const s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let r=""; for(let i=0;i<5;i++) r+=s[Math.floor(Math.random()*s.length)]; return "AFYA-"+r; }
function toast(text, isErr){ const t=document.createElement("div"); t.className="toast"+(isErr?" err":""); t.innerHTML='<span class="dot"></span>'+esc(text); el("toasts").appendChild(t); setTimeout(()=>{ t.style.opacity="0"; t.style.transform="translateY(8px)"; setTimeout(()=>t.remove(),200); }, 2700); }

/* ============================================================

   ============================================================ */
auth.onAuthStateChanged(async (user)=>{
  if(user){
    let role = "doctor";
    try{ const d = await db.collection("users").doc(user.uid).get(); if(d.exists && d.data().role) role = d.data().role; }catch(_){}
    CURRENT = { email:user.email||"", role };
    activePatient = null;
    renderDashboard();
  } else {
    activePatient = null;
    renderLogin();
  }
});

/* ============================================================
   LOGIN
   ============================================================ */
function renderLogin(){
  document.title = CONFIG.org + " — Sign in";
  el("app").innerHTML = `
  <div class="login">
    <aside class="login__aside">
      <div class="login__brand">${MARK}<span class="name">${esc(CONFIG.org)}</span></div>
      <div class="login__center">
        <h1 class="login__hook">Patient care, coordinated.</h1>
        <p class="login__sub">ID-based records, structured clerking, and guideline-aware differential support — every action logged.</p>
      </div>
      <div class="login__facts">
        <div>Reception<b>24 / 7</b></div>
        <div>Emergency<b>999 · 112</b></div>
        <div>Records<b>Audit-logged</b></div>
      </div>
    </aside>
    <main class="login__main">
      <div class="authcard">
        <h2 id="authTitle">Welcome back</h2>
        <p class="lede" id="authLede">Sign in to continue to the console.</p>
        <div class="seg" role="tablist" aria-label="Sign in or create account">
          <button id="segIn" class="is-active" role="tab" aria-selected="true">Sign in</button>
          <button id="segUp" role="tab" aria-selected="false">Create account</button>
        </div>
        <div class="field"><label for="email">Email</label><input id="email" class="control" type="email" autocomplete="email" placeholder="name@clinic.org"></div>
        <div class="field"><label for="password">Password</label><input id="password" class="control" type="password" autocomplete="current-password" placeholder="••••••••"></div>
        <div class="field" id="roleField" style="display:none"><label for="role">Role</label>
          <select id="role" class="control"><option value="doctor">Doctor</option><option value="nurse">Nurse</option><option value="admin">Admin</option></select>
        </div>
        <button id="authBtn" class="btn btn--primary btn--full" style="margin-top:6px">Sign in</button>
        <p class="msg" id="msg"></p>
      </div>
    </main>
  </div>`;

  let mode = "in";
  const apply = ()=>{
    const up = mode==="up";
    el("segIn").classList.toggle("is-active", !up); el("segUp").classList.toggle("is-active", up);
    el("segIn").setAttribute("aria-selected", String(!up)); el("segUp").setAttribute("aria-selected", String(up));
    el("roleField").style.display = up ? "block" : "none";
    el("authTitle").textContent = up ? "Create your account" : "Welcome back";
    el("authLede").textContent  = up ? "Set up access for a member of the care team." : "Sign in to continue to the console.";
    el("authBtn").textContent   = up ? "Create account" : "Sign in";
    el("password").autocomplete = up ? "new-password" : "current-password";
    el("msg").textContent = "";
  };
  el("segIn").onclick = ()=>{ mode="in"; apply(); };
  el("segUp").onclick = ()=>{ mode="up"; apply(); };
  el("authBtn").onclick = ()=> mode==="up" ? signup() : login();
  [el("email"),el("password")].forEach(i=> i.addEventListener("keydown",e=>{ if(e.key==="Enter") el("authBtn").click(); }));
}
function signup(){
  const email = el("email").value.trim(), password = el("password").value, role = el("role").value;
  if(!email || !password){ el("msg").textContent = "Enter an email and password."; return; }
  el("authBtn").disabled = true;
  auth.createUserWithEmailAndPassword(email, password)
    .then(res=> db.collection("users").doc(res.user.uid).set({ email, role }))
    .catch(e=>{ el("msg").textContent = e.message; el("authBtn").disabled = false; });
}
function login(){
  const email = el("email").value.trim(), password = el("password").value;
  if(!email || !password){ el("msg").textContent = "Enter an email and password."; return; }
  el("authBtn").disabled = true;
  auth.signInWithEmailAndPassword(email, password)
    .catch(e=>{ el("msg").textContent = e.message; el("authBtn").disabled = false; });
}
function logout(){ auth.signOut(); }

          <svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="logoutBtn" title="Sign out" aria-label="Sign out">
          <svg viewBox="0 0 24 24" fill="none"><path d="M14 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-2M10 12h10m0 0-3-3m3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>
    <nav class="tabs" role="tablist" aria-label="Sections">${tabsHtml}</nav>
    <div class="ctx" id="ctx"></div>
    <div class="main">

      <!-- PATIENTS -->
      <section class="panel is-active" data-panel="patients" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 01</span>
          <h2 class="panel__title">Patients</h2>
          <p class="panel__hint">Search or register a patient, then select to open the record.</p></div>
        <div class="grid--patients">
          <div class="card">
            <div class="search"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              <input id="patientSearch" placeholder="Search name, MRN or SHA…" autocomplete="off"></div>
            <button class="btn btn--ghost btn--sm btn--full" id="newPatientBtn" style="margin-bottom:12px">+ New patient</button>
            <div class="plist" id="patientList"><div class="loading"><span class="spin"></span></div></div>
          </div>
          <div id="patientDetail"></div>
        </div>
      </section>

      <!-- TRIAGE -->
      <section class="panel needs-patient" data-panel="triage" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 02</span>
          <h2 class="panel__title">Triage — MEWS</h2>
          <p class="panel__hint">Bedside vitals → MEWS. Decision support, not a substitute for assessment.</p></div>
        <div data-gate></div>
        <div data-work hidden>
          <div class="grid">
            <div class="card">
              <p class="card__label">Vitals</p>
              <div class="field"><div class="row-3">
                <div><label>Resp rate <span class="u">/min</span></label><input id="t_rr" class="control control--data" inputmode="numeric" placeholder="00"></div>
                <div><label>Heart rate <span class="u">bpm</span></label><input id="t_hr" class="control control--data" inputmode="numeric" placeholder="00"></div>
                <div><label>Systolic <span class="u">mmHg</span></label><input id="t_sbp" class="control control--data" inputmode="numeric" placeholder="000"></div>
              </div></div>
              <div class="field"><div class="row">
                <div><label>Temp <span class="u">°C</span></label><input id="t_temp" class="control control--data" inputmode="decimal" placeholder="37.0"></div>
                <div><label>Consciousness (AVPU)</label><select id="t_avpu" class="control"><option value="A">Alert</option><option value="V">Responds to voice</option><option value="P">Responds to pain</option><option value="U">Unresponsive</option></select></div>
              </div></div>
              <div class="actions">
                <button class="btn btn--primary" id="triageCalcBtn">Calculate MEWS</button>
                <button class="btn btn--ghost" id="triageSaveBtn" disabled>Save to record</button>
              </div>
            </div>
            <div id="triageOutWrap"><div class="readout is-ok" id="triageOut"><div class="readout__spine"></div><div class="readout__body"><p class="readout__label">Score</p><p class="readout__empty">Enter vitals and calculate.</p></div></div></div>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section class="panel needs-patient" data-panel="history" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 03</span>
          <h2 class="panel__title">Clinical history</h2>
          <p class="panel__hint">Structured clerking — adult or paediatric, with OBS/GYN for female patients.</p></div>
        <div data-gate></div>
        <div data-work id="historyWork" hidden></div>
      </section>

      <!-- LABS -->
      <section class="panel needs-patient" data-panel="labs" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 04</span>
          <h2 class="panel__title">Labs &amp; investigations</h2>
          <p class="panel__hint">Order tests, enter results against M/F ranges, download a report.</p></div>
        <div data-gate></div>
        <div data-work id="labsWork" hidden></div>
      </section>

      <!-- DIAGNOSIS -->
      <section class="panel needs-patient" data-panel="diagnosis" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 05</span>
          <h2 class="panel__title">Diagnosis</h2>
          <p class="panel__hint">Afya AI suggests differentials and ICD-10 codes from history and labs. The clinician decides and records the working diagnosis. Afya AI does not diagnose — all clinical decisions rest with the treating clinician.</p></div>
        <div data-gate></div>
        <div data-work hidden>
          <div class="grid">
            <!-- LEFT: AI differentials -->
            <div>
              <div class="card" style="border-color:var(--petrol);margin-bottom:16px">
                <p class="card__label" style="color:var(--petrol-700)">Afya AI · suggested differentials</p>
                <p class="hint" style="margin:-6px 0 14px;font-size:12.5px">Based on history and lab results. Click <strong>Set as diagnosis</strong> on any differential to pre-fill your working diagnosis below.</p>
                <div class="lab-indicator" id="dxLabIndicator" style="display:none">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 3v10.6l-3.5 5.8A2 2 0 0 0 7.2 22h9.6a2 2 0 0 0 1.7-3.1L15 13.6V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 3h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                  <span id="dxLabIndicatorText"></span>
                </div>
                <div class="actions" style="flex-wrap:wrap;gap:10px">
                  <button class="btn btn--primary" id="dxBtn">Suggest differentials</button>
                  <button class="btn btn--ghost referral-btn" onclick="generateReferral()" id="referralBtn" style="display:none">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                    Referral letter
                  </button>
                </div>
                <div id="dxOut" style="margin-top:16px"></div>
              </div>
            </div>

            <!-- RIGHT: Clinician working diagnosis -->
            <div>
              <div class="card">
                <p class="card__label">Clinician working diagnosis</p>
                <p class="hint" style="margin:-6px 0 14px;font-size:12.5px">Record your clinical decision. Type the condition, then click <strong>ICD-10</strong> for an AI-suggested code. You can override the code manually.</p>

                <!-- Primary -->
                <div style="margin-bottom:16px">
                  <div class="dx-working-label">Primary diagnosis</div>
                  <div class="field" style="margin-bottom:6px">
                    <label>Condition</label>
                    <input id="dx_primary" class="control" placeholder="e.g. Plasmodium falciparum malaria">
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <div style="flex:1;min-width:120px">
                      <input id="dx_primaryICD" class="control control--data" placeholder="ICD-10 code" style="font-size:13px">
                    </div>
                    <button class="dx-icd-btn" onclick="lookupICD('dx_primary','dx_primaryICD','dx_primaryICDChip')">ICD-10 →</button>
                  </div>
                  <div id="dx_primaryICDChip"></div>
                </div>

                <!-- Differential 1 -->
                <div style="margin-bottom:16px;padding-top:14px;border-top:1px solid var(--line)">
                  <div class="dx-working-label">Differential diagnosis 1</div>
                  <div class="field" style="margin-bottom:6px">
                    <label>Condition</label>
                    <input id="dx_diff1" class="control" placeholder="e.g. Typhoid fever">
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <div style="flex:1;min-width:120px">
                      <input id="dx_diff1ICD" class="control control--data" placeholder="ICD-10 code" style="font-size:13px">
                    </div>
                    <button class="dx-icd-btn" onclick="lookupICD('dx_diff1','dx_diff1ICD','dx_diff1ICDChip')">ICD-10 →</button>
                  </div>
                  <div id="dx_diff1ICDChip"></div>
                </div>

                <!-- Differential 2 -->
                <div style="margin-bottom:16px;padding-top:14px;border-top:1px solid var(--line)">
                  <div class="dx-working-label">Differential diagnosis 2</div>
                  <div class="field" style="margin-bottom:6px">
                    <label>Condition</label>
                    <input id="dx_diff2" class="control" placeholder="e.g. Bacterial pneumonia">
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <div style="flex:1;min-width:120px">
                      <input id="dx_diff2ICD" class="control control--data" placeholder="ICD-10 code" style="font-size:13px">
                    </div>
                    <button class="dx-icd-btn" onclick="lookupICD('dx_diff2','dx_diff2ICD','dx_diff2ICDChip')">ICD-10 →</button>
                  </div>
                  <div id="dx_diff2ICDChip"></div>
                </div>

                <div class="actions">
                  <button class="btn btn--primary" id="dxSaveBtn" onclick="saveDiagnosis()">Save diagnosis</button>
                  <button class="btn btn--ghost" onclick="clearDiagnosisForm()">Clear</button>
                </div>
                <p class="hint" style="margin-top:10px;font-size:12px">Saving will push the primary diagnosis to the Treatment tab as the working indication.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- MATERNITY -->
      <section class="panel needs-patient" data-panel="repro" role="tabpanel">
        <div class="panel__head"><span class="eyebrow">Section 07</span>
          <h2 class="panel__title">Reproductive Health</h2>
          <p class="panel__hint">Antenatal care, intrapartum, postnatal, and family planning. All encounters saved to patient record. Natal tab visible only when patient is marked pregnant.</p></div>
        <div data-gate></div>
        <div data-work hidden id="reproWork">
          <!-- Sub-tab bar — Natal hidden unless pregnant -->
          <div class="repro-seg" id="reproSegBar" role="tablist">
            <button class="is-active" data-rpanel="anc" onclick="switchReproTab('anc',this)" role="tab" aria-selected="true">ANC</button>
            <button id="reproNatalBtn" data-rpanel="natal" onclick="switchReproTab('natal',this)" role="tab" aria-selected="false" style="display:none">Natal / Intrapartum</button>
            <button data-rpanel="pnc" onclick="switchReproTab('pnc',this)" role="tab" aria-selected="false">Postnatal (PNC)</button>
            <button data-rpanel="fp" onclick="switchReproTab('fp',this)" role="tab" aria-selected="false">Family Planning</button>
          </div>

          <!-- ANC ─────────────────────────────────────────── -->
          <div class="repro-panel is-active" data-rpanel="anc">
            <div class="grid">
              <div class="card">
                <p class="card__label">Antenatal assessment</p>

                <!-- Pregnant toggle -->
                <label class="custom-toggle" id="reproPregnantLabel" style="margin-bottom:14px">
                  <input type="checkbox" id="anc_pregnant" onchange="onReproPregnantToggle()">
                  <span><strong>Mark as currently pregnant</strong> — enables Natal/Intrapartum tab</span>
                </label>

                <!-- Dating -->
                <div class="field"><div class="row">
                  <div><label>LMP date</label><input id="anc_lmp" class="control control--data" type="date" onchange="ancLmpToWeeks()"></div>
                  <div><label>Gestation <span class="u">wks</span></label><input id="anc_weeks" class="control control--data" inputmode="numeric" placeholder="auto"></div>
                </div></div>
                <div class="field"><div class="row">
                  <div><label>Gravida</label><input id="anc_grav" class="control control--data" inputmode="numeric" placeholder="G"></div>
                  <div><label>Para</label><input id="anc_para" class="control control--data" placeholder="P"></div>
                </div></div>
                <div class="field">
                  <label>ANC visit number</label>
                  <select id="anc_visit" class="control">
                    <option value="ANC1">ANC-1 (before 12 weeks)</option>
                    <option value="ANC2">ANC-2 (16 weeks)</option>
                    <option value="ANC3">ANC-3 (20 weeks)</option>
                    <option value="ANC4">ANC-4 (26 weeks)</option>
                    <option value="ANC5">ANC-5 (30 weeks)</option>
                    <option value="ANC6">ANC-6 (34 weeks)</option>
                    <option value="ANC7">ANC-7 (36 weeks)</option>
                    <option value="ANC8">ANC-8 (38–40 weeks)</option>
                  </select>
                </div>

                <!-- Vitals at visit -->
                <p class="card__label" style="margin-top:4px">Vitals at visit</p>
                <div class="field"><div class="row-3">
                  <div><label>BP <span class="u">mmHg</span></label><input id="anc_bp" class="control control--data" placeholder="120/80"></div>
                  <div><label>Weight <span class="u">kg</span></label><input id="anc_wt" class="control control--data" inputmode="decimal" placeholder="0.0"></div>
                  <div><label>Fundal ht <span class="u">cm</span></label><input id="anc_fh" class="control control--data" inputmode="numeric" placeholder="cm"></div>
                </div></div>
                <div class="field"><div class="row">
                  <div><label>Fetal HR <span class="u">bpm</span></label><input id="anc_fhr" class="control control--data" inputmode="numeric" placeholder="bpm"></div>
                  <div><label>Presentation</label>
                    <select id="anc_pres" class="control">
                      <option value="">—</option>
                      <option>Cephalic</option><option>Breech</option><option>Transverse</option><option>Not assessed</option>
                    </select>
                  </div>
                </div></div>

                <!-- PMTCT -->
                <p class="card__label" style="margin-top:4px">PMTCT</p>
                <div class="field"><div class="row">
                  <div><label>HIV status</label>
                    <select id="anc_hiv" class="control">
                      <option value="">Unknown / not tested</option>
                      <option value="negative">Negative</option>
                      <option value="positive">Positive — on ARVs</option>
                      <option value="positive_new">Positive — newly diagnosed</option>
                    </select>
                  </div>
                  <div><label>ARV prophylaxis</label>
                    <select id="anc_arv" class="control">
                      <option value="">N/A</option>
                      <option value="Option B+">Option B+ (TDF/3TC/EFV)</option>
                      <option value="AZT">AZT prophylaxis</option>
                      <option value="Other">Other regimen</option>
                    </select>
                  </div>
                </div></div>

                <!-- IPTp -->
                <p class="card__label" style="margin-top:4px">IPTp (SP doses)</p>
                <div class="anc-ipt">
                  <label><input type="checkbox" id="anc_sp1"> SP1 given</label>
                  <label><input type="checkbox" id="anc_sp2"> SP2 given</label>
                  <label><input type="checkbox" id="anc_sp3"> SP3 given</label>
                </div>

                <!-- Risk factors -->
                <p class="card__label" style="margin-top:14px">Risk factors</p>
                <div class="checks" id="anc_checks"></div>

                <div class="actions" style="margin-top:14px">
                  <button class="btn btn--primary" onclick="ancAssess()">Assess pathway</button>
                  <button class="btn btn--ghost" id="ancSaveBtn" disabled onclick="ancSave()">Save ANC visit</button>
                </div>
              </div>
              <div>
                <div class="readout is-ok" id="ancOut">
                  <div class="readout__spine"></div>
                  <div class="readout__body">
                    <p class="readout__label">Pathway</p>
                    <p class="readout__empty">Enter dating and assess.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- NATAL / INTRAPARTUM ──────────────────────────── -->
          <div class="repro-panel" data-rpanel="natal">
            <div class="grid">
              <div class="card">
                <p class="card__label">Intrapartum record</p>
                <div class="field"><div class="row">
                  <div><label>Mode of labour</label>
                    <select id="nat_labour" class="control">
                      <option value="spontaneous">Spontaneous</option>
                      <option value="induced">Induced</option>
                      <option value="augmented">Augmented</option>
                    </select>
                  </div>
                  <div><label>Cervical dilation on admission <span class="u">cm</span></label>
                    <input id="nat_dilation" class="control control--data" inputmode="numeric" placeholder="cm">
                  </div>
                </div></div>

                <!-- Partograph summary -->
                <p class="card__label" style="margin-top:4px">Partograph summary</p>
                <div class="parto-grid">
                  <div class="field" style="margin-bottom:0"><label>Duration of labour <span class="u">hrs</span></label><input id="nat_dur" class="control control--data" inputmode="numeric" placeholder="hrs"></div>
                  <div class="field" style="margin-bottom:0"><label>Contractions / 10 min</label><input id="nat_ctx" class="control control--data" inputmode="numeric" placeholder="0–5"></div>
                  <div class="field" style="margin-bottom:0"><label>Descent <span class="u">fifths</span></label><input id="nat_desc" class="control control--data" inputmode="numeric" placeholder="5/5→0/5"></div>
                  <div class="field" style="margin-bottom:0"><label>Maternal BP</label><input id="nat_bp" class="control control--data" placeholder="120/80"></div>
                  <div class="field" style="margin-bottom:0"><label>Maternal HR <span class="u">bpm</span></label><input id="nat_hr" class="control control--data" inputmode="numeric" placeholder="bpm"></div>
                  <div class="field" style="margin-bottom:0"><label>Fetal HR <span class="u">bpm</span></label><input id="nat_fhr" class="control control--data" inputmode="numeric" placeholder="bpm"></div>
                </div>

                <!-- Delivery outcome -->
                <p class="card__label" style="margin-top:14px">Delivery outcome</p>
                <div class="field"><div class="row">
                  <div><label>Mode of delivery</label>
                    <select id="nat_mode" class="control">
                      <option value="svd">Spontaneous vaginal (SVD)</option>
                      <option value="assisted">Assisted vaginal (forceps/vacuum)</option>
                      <option value="cs_elective">Elective caesarean</option>
                      <option value="cs_emergency">Emergency caesarean</option>
                      <option value="breech">Breech vaginal</option>
                    </select>
                  </div>
                  <div><label>Delivery date &amp; time</label><input id="nat_time" class="control control--data" type="datetime-local"></div>
                </div></div>
                <div class="field"><div class="row-3">
                  <div><label>Birth weight <span class="u">kg</span></label><input id="nat_bwt" class="control control--data" inputmode="decimal" placeholder="3.2"></div>
                  <div><label>Apgar 1 min</label><input id="nat_apgar1" class="control control--data" inputmode="numeric" placeholder="0–10"></div>
                  <div><label>Apgar 5 min</label><input id="nat_apgar5" class="control control--data" inputmode="numeric" placeholder="0–10"></div>
                </div></div>

                <!-- Complications -->
                <p class="card__label" style="margin-top:4px">Complications</p>
                <div class="checks">
                  <label class="check"><input type="checkbox" value="pph"><span>Postpartum haemorrhage (PPH)</span></label>
                  <label class="check"><input type="checkbox" value="perineal_tear"><span>Perineal tear / episiotomy</span></label>
                  <label class="check"><input type="checkbox" value="cord_complications"><span>Cord complications</span></label>
                  <label class="check"><input type="checkbox" value="neonatal_resus"><span>Neonatal resuscitation required</span></label>
                  <label class="check"><input type="checkbox" value="shoulder_dystocia"><span>Shoulder dystocia</span></label>
                  <label class="check"><input type="checkbox" value="none"><span>No complications</span></label>
                </div>
                <div class="field" style="margin-top:10px"><label>Notes</label><textarea id="nat_notes" class="control" style="min-height:70px" placeholder="Additional intrapartum notes…"></textarea></div>
                <div class="actions">
                  <button class="btn btn--primary" onclick="natalSave()">Save delivery record</button>
                </div>
              </div>
              <div class="card">
                <p class="card__label">Intrapartum quick reference</p>
                <div style="font-size:13px;color:var(--ink-soft);line-height:1.8">
                  <p><b>Normal progress:</b> ≥1 cm/hr in active phase</p>
                  <p><b>Apgar ≥7:</b> Normal · 4–6: Needs stimulation · &lt;4: Resuscitate</p>
                  <p><b>PPH:</b> Blood loss &gt;500 ml (vaginal) or &gt;1000 ml (CS)</p>
                  <p><b>Refer if:</b> Prolonged labour, fetal distress, malpresentation, eclampsia, severe PPH</p>
                  <p style="margin-top:8px"><b>Active management 3rd stage:</b> Oxytocin 10 IU IM immediately after delivery</p>
                </div>
              </div>
            </div>
          </div>

          <!-- POSTNATAL CARE ───────────────────────────────── -->
          <div class="repro-panel" data-rpanel="pnc">
            <div class="grid">
              <div class="card">
                <p class="card__label">Postnatal assessment</p>
                <div class="field"><div class="row">
                  <div><label>Delivery date</label><input id="pnc_del" class="control control--data" type="date" onchange="pncCalcDays()"></div>
                  <div><label>Days postpartum</label><input id="pnc_days" class="control control--data" inputmode="numeric" placeholder="auto"></div>
                </div></div>
                <div class="field">
                  <label>PNC visit</label>
                  <select id="pnc_visit" class="control">
                    <option value="day1">Day 1 — within 24 hours of delivery</option>
                    <option value="day3">Day 3 — check healing, breastfeeding</option>
                    <option value="day7">Day 7 — cord, weight, immunisation</option>
                    <option value="week6">Week 6 — full review &amp; FP counselling</option>
                  </select>
                </div>

                <!-- Maternal -->
                <p class="card__label" style="margin-top:4px">Maternal assessment</p>
                <div class="field"><div class="row">
                  <div><label>BP <span class="u">mmHg</span></label><input id="pnc_bp" class="control control--data" placeholder="120/80"></div>
                  <div><label>Temperature <span class="u">°C</span></label><input id="pnc_temp" class="control control--data" inputmode="decimal" placeholder="37.0"></div>
                </div></div>
                <div class="checks" id="pnc_maternal_checks">
                  <label class="check"><input type="checkbox" value="lochia_normal"><span>Lochia normal</span></label>
                  <label class="check"><input type="checkbox" value="perineum_healing"><span>Perineum healing well</span></label>
                  <label class="check"><input type="checkbox" value="breastfeeding_ok"><span>Breastfeeding established</span></label>
                  <label class="check"><input type="checkbox" value="mastitis"><span>Mastitis / breast problem</span></label>
                  <label class="check"><input type="checkbox" value="mood_low"><span>Low mood / depression screen positive</span></label>
                  <label class="check"><input type="checkbox" value="bp_high"><span>Raised BP</span></label>
                </div>

                <!-- Baby -->
                <p class="card__label" style="margin-top:14px">Baby assessment</p>
                <div class="field"><div class="row">
                  <div><label>Baby weight <span class="u">kg</span></label><input id="pnc_bwt" class="control control--data" inputmode="decimal" placeholder="3.2"></div>
                  <div><label>Temperature <span class="u">°C</span></label><input id="pnc_btemp" class="control control--data" inputmode="decimal" placeholder="37.0"></div>
                </div></div>
                <div class="checks" id="pnc_baby_checks">
                  <label class="check"><input type="checkbox" value="feeding_well"><span>Feeding well</span></label>
                  <label class="check"><input type="checkbox" value="cord_clean"><span>Cord clean and dry</span></label>
                  <label class="check"><input type="checkbox" value="jaundice"><span>Jaundice present</span></label>
                  <label class="check"><input type="checkbox" value="bcg_given"><span>BCG given</span></label>
                  <label class="check"><input type="checkbox" value="polio0_given"><span>Polio-0 given</span></label>
                </div>

                <div class="field" style="margin-top:10px">
                  <label>Refer?</label>

function switchTab(id){
  $$(".tab").forEach(b=>{ const on=b.dataset.tab===id; b.classList.toggle("is-active",on); b.setAttribute("aria-selected",String(on)); });
  $$(".panel").forEach(p=> p.classList.toggle("is-active", p.dataset.panel===id));
  if(id==="activity") loadActivity();
  if(id==="pharmacy") renderPharmacy();
  if(id==="repro") reproRefresh();
  /* Refresh pipeline to show active pill */
  if(activePatient) renderCtx();
  /* Auto-calc billing when switching to billing tab */
  if(id==="billing" && activePatient){ const lines=billGetLines(); if(lines.length) billCalc(); }
  /* Sync bottom nav active state */
  refreshBnavActive(id);
}

let encounterKinds = new Set();

function renderCtx(){
  const ctx = el("ctx"); if(!ctx) return;
  if(!activePatient){
    ctx.innerHTML = `
      <div class="ctx__none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.6"/><path d="M5 20c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        No patient selected — choose one under Patients to begin an encounter.
      </div>`;
    return;
  }
  const p = activePatient;
  const activeTab = (document.querySelector(".tab.is-active")||{}).dataset?.tab || "";

  /* Safety badges */
  const allergyBadge = p.allergies
    ? `<span class="ctx__badge ctx__badge--allergy">&#9888; ${esc(p.allergies.length>26?p.allergies.slice(0,24)+"…":p.allergies)}</span>`
    : "";
  const pregBadge = p.pregnant
    ? `<span class="ctx__badge ctx__badge--pregnant">&#9792; Pregnant</span>`
    : "";

  /* Progress pipeline */
  const pills = PIPELINE_STAGES.map((s,i)=>{
    const isDone   = encounterKinds.has(s.kind);
    const isActive = activeTab === s.tab;
    const sep = i < PIPELINE_STAGES.length-1
      ? `<span class="prog-sep">&rsaquo;</span>` : "";
    if(isActive){
      return `<button class="prog-pill prog-pill--active" onclick="switchTab('${s.tab}')"
        title="${s.label}"><span class="prog-dot pulse"></span>${esc(s.label)}</button>${sep}`;
    } else if(isDone){
      return `<button class="prog-pill prog-pill--done" onclick="switchTab('${s.tab}')"
        title="${s.label} — completed"><svg viewBox="0 0 24 24" fill="none" width="12" height="12"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>${esc(s.label)}</button>${sep}`;
    } else {
      return `<button class="prog-pill prog-pill--empty" onclick="switchTab('${s.tab}')"
        title="${s.label} — not started"><span class="prog-dot" style="opacity:.25"></span>${esc(s.label)}</button>${sep}`;
    }
  }).join("");

  ctx.innerHTML = `
    <div class="ctx__left">
      ${AVATAR}
      <div class="ctx__meta">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="nm" style="font-family:var(--data);font-weight:700;font-size:13.5px;letter-spacing:.02em">${esc(p.code)}</span>
          <span class="mt" style="font-size:12px;color:var(--ink-soft)">${esc(String(p.age))}${esc(p.sex||"")}${p.residence?" &middot; "+esc(p.residence):""}</span>
        </div>
        ${allergyBadge||pregBadge ? `<div class="ctx__badges">${allergyBadge}${pregBadge}</div>` : ""}
      </div>
      <button class="ctx__clear" id="ctxClear" title="Clear patient" aria-label="Clear patient">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none"><path d="m7 7 10 10M17 7 7 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="ctx__right">${pills}</div>`;

  el("ctxClear").onclick = ()=>{
    activePatient=null; encounterKinds=new Set();
    renderCtx(); refreshGates(); buildHistory(); buildLabs();
    txSheet=[]; labOrders=[];
    if(el("tx_sheetWrap")) renderTxSheet();
    clearTxForm(); clearDiagnosisForm(); clearWorkingDx(); resetAutoBill();
    $$(".pitem").forEach(i=>i.classList.remove("is-active"));
    /* remove encounter pip */
    el("bnav_encounter")?.querySelector(".bnav-pip")?.remove();
    renderPatientDetail();
  };
}
function gateHtml(){
  return `<div class="gate"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.6"/><path d="M5 20c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>

function refreshGates(){

async function setPregnant(val){
  if(!activePatient) return;
  try{ await db.collection("patients").doc(activePatient.id).update({ pregnant: val }); }
  catch(e){ toast("Update failed: "+e.message, true); return; }
  activePatient.pregnant = val;
  const c = patientsCache.find(x=>x.id===activePatient.id); if(c) c.pregnant = val;
  const chk = el("h_preg"); if(chk) chk.checked = val;
  refreshGates(); renderPatientDetail();
  audit(val?"Marked pregnant":"Pregnancy cleared", activePatient.id);
  toast(val?"Marked as pregnant":"Pregnancy cleared");
}
